<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Touch Grass</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body { overflow:hidden; background:#070e02; }

canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  cursor: crosshair;
  display: block;
}

/* ── Floating controls ───────────────────────── */
#panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(4, 10, 2, 0.78);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.07);
  z-index: 10;
}

#panel-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 10px 24px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: system-ui, sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}
#panel-toggle:hover { color: rgba(255,255,255,0.7); }

#panel-chevron {
  display: inline-block;
  width: 8px; height: 8px;
  border-right: 1.5px solid currentColor;
  border-bottom: 1.5px solid currentColor;
  transform: rotate(225deg);
  transition: transform 0.2s ease;
  margin-left: 8px;
}
#panel.collapsed #panel-chevron { transform: rotate(45deg); }

#panel-body {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0 28px;
  padding: 0 24px 18px;
  overflow: hidden;
  max-height: 420px;
  opacity: 1;
  transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease;
}
#panel.collapsed #panel-body {
  max-height: 0;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
  pointer-events: none;
}
@media (max-width: 520px) {
  #panel-body { grid-template-columns: repeat(2, 1fr); }
}

.col-title {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  font-family: system-ui, sans-serif;
}

.ctrl { margin-bottom: 9px; }
.ctrl:last-child { margin-bottom: 0; }

.ctrl-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 3px;
}
.ctrl-label {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  font-family: system-ui, sans-serif;
}
.ctrl-val {
  font-size: 10px;
  font-family: 'Courier New', monospace;
  color: rgba(255,255,255,0.85);
  min-width: 40px;
  text-align: right;
}

input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 2px;
  background: rgba(255,255,255,0.14);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #5aaa28;
  box-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
input[type=range]::-moz-range-thumb {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #5aaa28;
  border: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="panel">
  <button type="button" id="panel-toggle" aria-expanded="true" aria-controls="panel-body">
    <span>Controls</span>
    <span id="panel-chevron" aria-hidden="true"></span>
  </button>
  <div id="panel-body">
  <div>
    <p class="col-title">Grass</p>
    <div class="ctrl">
      <div class="ctrl-top"><span class="ctrl-label">Density</span><span class="ctrl-val" id="v-density">2600</span></div>
      <input type="range" id="s-density" min="200" max="5000" value="2600" step="100">
    </div>
    <div class="ctrl">
      <div class="ctrl-top"><span class="ctrl-label">Height</span><span class="ctrl-val" id="v-height">1.4</span></div>
      <input type="range" id="s-height" min="0.3" max="2.5" value="1.4" step="0.1">
    </div>
    <div class="ctrl">
      <div class="ctrl-top"><span class="ctrl-label">Width</span><span class="ctrl-val" id="v-width">0.7</span></div>
      <input type="range" id="s-width" min="0.2" max="3.5" value="0.7" step="0.1">
    </div>
    <div class="ctrl">
      <div class="ctrl-top"><span class="ctrl-label">Clump spread</span><span class="ctrl-val" id="v-spread">0.045</span></div>
      <input type="range" id="s-spread" min="0.002" max="0.12" value="0.045" step="0.002">
    </div>
  </div>

  <div>
    <p class="col-title">Wind</p>
    <div class="ctrl">
      <div class="ctrl-top"><span class="ctrl-label">Lean</span><span class="ctrl-val" id="v-lean">-0.06</span></div>
      <input type="range" id="s-lean" min="-0.4" max="1.0" value="-0.06" step="0.02">
    </div>
    <div class="ctrl">
      <div class="ctrl-top"><span class="ctrl-label">Strength</span><span class="ctrl-val" id="v-wstr">0.248</span></div>
      <input type="range" id="s-wstr" min="0" max="0.40" value="0.248" step="0.004">
    </div>
    <div class="ctrl">
      <div class="ctrl-top"><span class="ctrl-label">Speed</span><span class="ctrl-val" id="v-wspd">0.05</span></div>
      <input type="range" id="s-wspd" min="0.01" max="2.5" value="0.05" step="0.01">
    </div>
    <div class="ctrl">
      <div class="ctrl-top"><span class="ctrl-label">Turbulence</span><span class="ctrl-val" id="v-wturb">0.120</span></div>
      <input type="range" id="s-wturb" min="0" max="0.30" value="0.120" step="0.004">
    </div>
  </div>

  <div>
    <p class="col-title">Interaction</p>
    <div class="ctrl">
      <div class="ctrl-top"><span class="ctrl-label">Mouse radius</span><span class="ctrl-val" id="v-mrad">60</span></div>
      <input type="range" id="s-mrad" min="10" max="300" value="60" step="5">
    </div>
    <div class="ctrl">
      <div class="ctrl-top"><span class="ctrl-label">Mouse force</span><span class="ctrl-val" id="v-mforce">0.26</span></div>
      <input type="range" id="s-mforce" min="0" max="1.2" value="0.26" step="0.02">
    </div>
    <div class="ctrl">
      <div class="ctrl-top"><span class="ctrl-label">Stiffness</span><span class="ctrl-val" id="v-stiff">0.042</span></div>
      <input type="range" id="s-stiff" min="0.005" max="0.18" value="0.042" step="0.002">
    </div>
    <div class="ctrl">
      <div class="ctrl-top"><span class="ctrl-label">Damping</span><span class="ctrl-val" id="v-damp">0.675</span></div>
      <input type="range" id="s-damp" min="0.60" max="0.98" value="0.675" step="0.005">
    </div>
  </div>
  </div>
</div>

<script>
(() => {
  const cv  = document.getElementById('c');
  const ct  = cv.getContext('2d');
  const PI2 = Math.PI * 2;

  // ── Params ──────────────────────────────────────────────────────────────────
  const P = {
    density: 2600,
    height:  1.4,
    width:   0.7,
    spread:  0.045,
    lean:   -0.06,
    wStr:    0.248,
    wSpd:    0.05,
    wTurb:   0.120,
    mRad:    60,
    mForce:  0.26,
    stiff:   0.042,
    damp:    0.675,
  };

  let W, H, dpr;

  function setup() {
    dpr = devicePixelRatio || 1;
    W   = window.innerWidth;
    H   = window.innerHeight;
    cv.style.width  = W + 'px';
    cv.style.height = H + 'px';
    cv.width  = W * dpr;
    cv.height = H * dpr;
    ct.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // ── Blade ───────────────────────────────────────────────────────────────────
  // rx, ry are normalised [0,1] screen coordinates.
  // ry=0 → top of screen (far, small, dark)
  // ry=1 → bottom of screen (close, large, bright)
  class Blade {
    constructor(rx, ry, clumpLean) {
      this.rx = rx;
      this.ry = ry;

      const depth = 0.22 + ry * 0.78;

      this.bladeHBase = (38 + Math.random() * 28) * depth;
      this.hwBase     = (0.5 + Math.random() * 0.8) * depth;

      this.clumpLean = clumpLean;
      this.randLean  = (Math.random() - 0.5) * 0.10;
      const naturalLean = P.lean + clumpLean + this.randLean;
      this.baseAngle = naturalLean;
      this.tipAngle  = naturalLean;
      this.baseVel   = 0;
      this.tipVel    = 0;

      this.awnCount  = 3 + Math.floor(Math.random() * 3);
      this.awnLength = (8 + Math.random() * 14) * depth;
      this.awnSpread = 0.18 + Math.random() * 0.12;
      this.awnAngle  = naturalLean;
      this.awnVel    = 0;

      this.phase = Math.random() * PI2;
      this.woff  = rx * 4.5;

      const gB = 55 + Math.floor(ry * 20) + Math.floor(Math.random() * 14);
      const rB = Math.floor(gB * (0.42 + Math.random() * 0.06));
      const bB = Math.floor(gB * (0.28 + Math.random() * 0.06));
      this.cBase = `rgb(${rB},${gB},${bB})`;

      const gM = Math.min(255, gB + 44);
      const rM = Math.floor(gM * 0.44);
      const bM = Math.floor(gM * 0.26);
      this.cMid = `rgb(${rM},${gM},${bM})`;

      this.tBase = 185 + Math.floor(ry * 20) + Math.floor(Math.random() * 30);
      this.cTip = `rgba(${Math.floor(this.tBase*0.92)},${this.tBase},${Math.floor(this.tBase*0.82)},0.80)`;

      this.bx = 0; this.by = 0;
    }

    update(mx, my, t) {
      // Screen position — recomputes correctly after any resize
      this.bx = this.rx * W;
      this.by = this.ry * H;

      const sp  = P.wSpd * 0.001;
      const wp  = this.woff + t * sp;
      const windFull = Math.sin(wp + this.phase)                       * P.wStr
                     + Math.sin(wp * 0.55 + this.phase * 1.38 + 1.2)  * P.wTurb
                     + Math.sin(wp * 1.95 + this.phase * 0.48 + 2.9)  * (P.wTurb * 0.28);
      const windBase = windFull * 0.35;
      const windTip  = windFull;

      const lean = P.lean + this.clumpLean + this.randLean;
      const natBase = lean + windBase;
      const natTip  = lean + windTip;

      this.baseVel += (natBase - this.baseAngle) * (P.stiff * 2.2);
      this.baseVel *= Math.min(P.damp + 0.055, 0.995);
      this.baseAngle += this.baseVel;

      this.tipVel += (natTip - this.tipAngle) * (P.stiff * 0.32);
      this.tipVel *= Math.max(P.damp - 0.08, 0.55);
      this.tipAngle += this.tipVel;

      const natAwn = natTip + Math.sin(t * 0.003 + this.phase * 2.1) * 0.12;
      this.awnVel += (natAwn - this.awnAngle) * (P.stiff * 0.15);
      this.awnVel *= Math.max(P.damp - 0.14, 0.50);
      this.awnAngle += this.awnVel;

      const dx = this.bx - mx, dy = this.by - my;
      const d2 = dx*dx + dy*dy, R = P.mRad;
      if (d2 < R*R && d2 > 0) {
        const d = Math.sqrt(d2);
        const pushForce = (dx/d) * ((1 - d/R)**2) * P.mForce;
        this.baseVel += pushForce;
        this.tipVel  += pushForce * 0.65;
      }

      this.baseAngle = Math.max(-0.7, Math.min(0.9,  this.baseAngle));
      this.tipAngle  = Math.max(-1.0, Math.min(1.15, this.tipAngle));
    }

    draw() {
      const bA = this.baseAngle;
      const tA = this.tipAngle;
      const h  = this.bladeHBase * P.height;
      const hw = this.hwBase * P.width;
      const bx = this.bx, by = this.by;

      const cp1x = bx + Math.sin(bA * 0.30) * h * 0.26;
      const cp1y = by - h * 0.30;
      const cp2x = bx + Math.sin(bA * 0.25 + tA * 0.45) * h * 0.58;
      const cp2y = by - h * 0.64;
      const tipX = bx + Math.sin(tA) * h;
      const tipY = by - Math.cos(Math.min(Math.abs(tA), 1.2)) * h;

      const px = Math.cos(bA), py = Math.sin(bA);
      const w0 = hw, w1 = hw*0.50, w2 = hw*0.13;

      const gr = ct.createLinearGradient(bx, by, tipX, tipY);
      gr.addColorStop(0.00, this.cBase);
      gr.addColorStop(0.38, this.cMid);
      gr.addColorStop(1.00, this.cTip);

      ct.beginPath();
      ct.moveTo(bx - px*w0, by - py*w0);
      ct.bezierCurveTo(cp1x - px*w1, cp1y - py*w1, cp2x - px*w2, cp2y - py*w2, tipX, tipY);
      ct.bezierCurveTo(cp2x + px*w2, cp2y + py*w2, cp1x + px*w1, cp1y + py*w1, bx + px*w0, by + py*w0);
      ct.closePath();
      ct.fillStyle = gr;
      ct.fill();

      const awnLen = this.awnLength * P.height;
      const awnBase = (this.awnCount - 1) / 2;
      for (let i = 0; i < this.awnCount; i++) {
        const spread = (i - awnBase) * this.awnSpread;
        const aA = this.awnAngle + spread;
        const awnTipX = tipX + Math.sin(aA) * awnLen;
        const awnTipY = tipY - Math.cos(Math.min(Math.abs(aA), 1.4)) * awnLen;

        const awnGr = ct.createLinearGradient(tipX, tipY, awnTipX, awnTipY);
        awnGr.addColorStop(0, `rgba(${Math.floor(this.tBase*0.85)},${this.tBase},${Math.floor(this.tBase*0.75)},0.65)`);
        awnGr.addColorStop(1, 'rgba(220,230,200,0.0)');

        ct.beginPath();
        ct.moveTo(tipX, tipY);
        ct.lineTo(awnTipX, awnTipY);
        ct.strokeStyle = awnGr;
        ct.lineWidth = 0.5;
        ct.stroke();
      }
    }
  }

  // ── Population ──────────────────────────────────────────────────────────────
  let blades = [];

  function mkBlades() {
    blades = [];
    const PER   = 10;
    const TUFTS = Math.max(10, Math.ceil(P.density / PER));

    for (let ti = 0; ti < TUFTS; ti++) {
      const rx        = Math.random();
      const ry        = Math.pow(Math.random(), 0.55);
      const clumpLean = (Math.random() - 0.5) * 0.10;

      for (let i = 0; i < PER; i++) {
        const ang  = Math.random() * PI2;
        const sprd = Math.sqrt(Math.random()) * P.spread;
        const brx  = Math.max(0, Math.min(1, rx + Math.cos(ang) * sprd));
        const bry  = Math.max(0, Math.min(1, ry + Math.sin(ang) * sprd * 0.6));
        blades.push(new Blade(brx, bry, clumpLean));
      }
    }
    blades.sort((a, b) => a.ry - b.ry);
  }

  // ── Background ──────────────────────────────────────────────────────────────
  // Dark gradient that reads as "deep occluded grass" everywhere.
  // Matches the darkest blade base colour so gaps are invisible.
  function drawBg() {
    const bg = ct.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0.00, '#0e2008');
    bg.addColorStop(0.45, '#091503');
    bg.addColorStop(1.00, '#040a01');
    ct.fillStyle = bg;
    ct.fillRect(0, 0, W, H);
  }

  // ── Sliders ─────────────────────────────────────────────────────────────────
  let rebuildTimer = null;
  const scheduleRebuild = () => { clearTimeout(rebuildTimer); rebuildTimer = setTimeout(mkBlades, 180); };

  function bind(sid, vid, key, fmt, rebuild) {
    const sl = document.getElementById(sid);
    const vl = document.getElementById(vid);
    sl.addEventListener('input', () => {
      P[key] = parseFloat(sl.value);
      vl.textContent = fmt(P[key]);
      if (rebuild) scheduleRebuild();
    });
  }

  const f1 = v => v.toFixed(1);
  const f2 = v => v.toFixed(2);
  const f3 = v => v.toFixed(3);
  const fi = v => Math.round(v);

  bind('s-density', 'v-density', 'density', fi,  true);
  bind('s-height',  'v-height',  'height',  f1,  false);
  bind('s-width',   'v-width',   'width',   f1,  false);
  bind('s-spread',  'v-spread',  'spread',  f3,  true);
  bind('s-lean',    'v-lean',    'lean',    f2,  false);
  bind('s-wstr',    'v-wstr',    'wStr',    f3,  false);
  bind('s-wspd',    'v-wspd',    'wSpd',    f2,  false);
  bind('s-wturb',   'v-wturb',   'wTurb',   f3,  false);
  bind('s-mrad',    'v-mrad',    'mRad',    fi,  false);
  bind('s-mforce',  'v-mforce',  'mForce',  f2,  false);
  bind('s-stiff',   'v-stiff',   'stiff',   f3,  false);
  bind('s-damp',    'v-damp',    'damp',    f3,  false);

  // ── Panel collapse ─────────────────────────────────────────────────────────
  const panel = document.getElementById('panel');
  const panelToggle = document.getElementById('panel-toggle');
  panelToggle.addEventListener('click', () => {
    const collapsed = panel.classList.toggle('collapsed');
    panelToggle.setAttribute('aria-expanded', String(!collapsed));
  });

  // ── Input ───────────────────────────────────────────────────────────────────
  const mouse = { x: -9e4, y: -9e4 };
  const gp = e => ({ x: e.clientX, y: e.clientY });

  window.addEventListener('mousemove', e => { const p=gp(e); mouse.x=p.x; mouse.y=p.y; });
  window.addEventListener('mouseleave', () => { mouse.x=-9e4; mouse.y=-9e4; });
  window.addEventListener('touchmove', e => {
    const p = gp(e.touches[0]); mouse.x=p.x; mouse.y=p.y;
  }, { passive: true });
  window.addEventListener('touchend', () => { mouse.x=-9e4; mouse.y=-9e4; });

  // ── Loop ────────────────────────────────────────────────────────────────────
  let t = 0;
  function frame() {
    if (!W || !H) { requestAnimationFrame(frame); return; }
    t++;
    drawBg();
    for (const b of blades) { b.update(mouse.x, mouse.y, t); b.draw(); }
    requestAnimationFrame(frame);
  }

  let rt;
  window.addEventListener('resize', () => {
    clearTimeout(rt);
    rt = setTimeout(() => { setup(); mkBlades(); }, 120);
  });

  requestAnimationFrame(() => { setup(); mkBlades(); frame(); });
})();
</script>
</body>
</html>
