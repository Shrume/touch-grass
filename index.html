function updateFireflies(delta, elapsed, gustStrength, gustDirX, gustDirZ,
                          cursorX, cursorZ, cursorSpeed, cursorOnGrass) {
  if (rainT > 0.5) {
    fireflyFadeT = Math.max(0, fireflyFadeT - delta * 2.0);
    return;
  }
  if (fireflyFadeT === 0.0 && !isNight) return;

  const spawnThreshold = 4.0;
  if (cursorOnGrass && cursorSpeed > spawnThreshold && Math.random() < cursorSpeed * 0.012) {
    const tempEnd = FIREFLY_PERMANENT + ffTempMax;
    for (let s = FIREFLY_PERMANENT; s < tempEnd; s++) {
      if (!ff[s].active) {
        const f = ff[s];
        f.active    = true;
        f.homeX     = cursorX + (Math.random() - 0.5) * 3.0;
        f.homeZ     = cursorZ + (Math.random() - 0.5) * 3.0;
        f.x         = f.homeX;
        f.y         = 0.2 + Math.random() * 0.5;
        f.z         = f.homeZ;
        f.lifespan  = 4.0 + Math.random() * 5.0;
        f.maxLife   = f.lifespan;
        f.fadeProgress = 0;
        f.fadeState = 'on';
        f.breathePhase = Math.random() * Math.PI * 2;
        f.repelX    = (Math.random() - 0.5) * 2.0;
        f.repelZ    = (Math.random() - 0.5) * 2.0;
        f.windAccumX = 0;
        f.windAccumZ = 0;
        break;
      }
    }
  }

  for (let i = 0; i < fireflyLoopCount; i++) {
    const f = ff[i];

    if (!f.isTemp && i >= ffPermMax) {
      f.brightness *= 0.88;
      ffPositions[i * 3]     = -9999;
      ffPositions[i * 3 + 1] = -9999;
      ffPositions[i * 3 + 2] = -9999;
      ffBrightness[i]        = 0;
      continue;
    }

    const windPush = gustStrength * 1.2 * delta;
    f.windAccumX += gustDirX * windPush;
    f.windAccumZ += gustDirZ * windPush;
    f.windAccumX *= 0.992;
    f.windAccumZ *= 0.992;

    const t = elapsed;
    const wx = Math.sin(t * f.wanderSpeed * 0.41 + f.heightPhase)       * f.wanderRadius
             + Math.sin(t * f.wanderSpeed * 0.17 + f.heightPhase * 1.6) * f.wanderRadius * 0.45;
    const wz = Math.cos(t * f.wanderSpeed * 0.29 + f.heightPhase * 2.3) * f.wanderRadius
             + Math.cos(t * f.wanderSpeed * 0.13 + f.heightPhase * 0.7) * f.wanderRadius * 0.4;

    f.x = f.homeX + wx + f.windAccumX;
    f.z = f.homeZ + wz + f.windAccumZ;

    f.y = f.heightMin + (f.heightMax - f.heightMin) *
          (Math.sin(performance.now() * 0.001 * f.heightSpeed + f.heightPhase) * 0.5 + 0.5);

    if (cursorOnGrass) {
      const dx = f.x - cursorX;
      const dz = f.z - cursorZ;
      const dist2 = dx * dx + dz * dz;
      if (dist2 < FF_REPEL_RADIUS && dist2 > 0.01) {
        const dist  = Math.sqrt(dist2);
        const force = (1.0 - dist2 / FF_REPEL_RADIUS) * 2.5 * delta;
        f.windAccumX += (dx / dist) * force;
        f.windAccumZ += (dz / dist) * force;
        f.y = Math.min(f.heightMax + 1.5, f.y + force * 0.8);
      }
    }

    if (f.isTemp) {
      if (!f.active) {
        f.brightness = 0;
        ffPositions[i * 3]     = -9999;
        ffPositions[i * 3 + 1] = -9999;
        ffPositions[i * 3 + 2] = -9999;
        ffBrightness[i]        = 0;
        continue;
      }

      f.lifespan -= delta;
      if (f.lifespan <= 0) {
        f.active = false;
        continue;
      }

      const lifeT = f.lifespan / f.maxLife;
      const birthFade = Math.min(1.0, (f.maxLife - f.lifespan) / 0.4);
      const deathFade = lifeT < 0.3 ? lifeT / 0.3 : 1.0;
      f.fadeProgress = 0;

      f.repelX *= 0.94;
      f.repelZ *= 0.94;
      f.x += f.repelX * delta;
      f.z += f.repelZ * delta;

      const breathe = Math.sin(elapsed * f.breatheSpeed + f.breathePhase) * 0.5 + 0.5;
      f.brightness  = f.baseGlow * birthFade * deathFade
                    * (0.6 + breathe * 0.4);
    } else {
      const breathe = Math.sin(elapsed * f.breatheSpeed + f.breathePhase) * 0.5 + 0.5;
      const glowFromBreathe = f.baseGlow + breathe * (1.0 - f.baseGlow) * 0.45;

      if (f.fadeState === 'on') {
        f.fadeTimer -= delta;
        f.fadeProgress = 0;
        if (f.fadeTimer <= 0) {
          f.fadeState    = 'fadingOut';
          f.fadeProgress = 0;
          f.fadeDuration = 1.0 + Math.random() * 0.8;
        }
      } else if (f.fadeState === 'fadingOut') {
        f.fadeProgress += delta / f.fadeDuration;
        if (f.fadeProgress >= 1) {
          f.fadeProgress = 1;
          f.fadeState    = 'fadingIn';
          f.fadeDuration = 1.5 + Math.random() * 1.2;
        }
      } else if (f.fadeState === 'fadingIn') {
        f.fadeProgress -= delta / f.fadeDuration;
        if (f.fadeProgress <= 0) {
          f.fadeProgress = 0;
          f.fadeState    = 'on';
          f.fadeTimer    = 6 + Math.random() * 14;
        }
      }

      const fadeEnvelope = 1.0 - (3 * f.fadeProgress * f.fadeProgress
                                 - 2 * f.fadeProgress * f.fadeProgress * f.fadeProgress);

      f.brightness = glowFromBreathe * fadeEnvelope;
    }

    ffPositions[i * 3]     = f.x;
    ffPositions[i * 3 + 1] = f.y;
    ffPositions[i * 3 + 2] = f.z;
    ffBrightness[i]        = f.brightness;
  }

  ffGeo.attributes.position.needsUpdate    = true;
  ffGeo.attributes.aBrightness.needsUpdate = true;
}

function updateClips(delta) {
  if (activeClips.length === 0) return;

  for (let ai = activeClips.length - 1; ai >= 0; ai--) {
    const i = activeClips[ai];
    const c = clips[i];

    c.age += delta;
    if (c.age >= c.maxAge || c.y < 0) {
      c.active = false;
      clipAlphaArr[i] = 0;
      activeClips.splice(ai, 1);
      continue;
    }

    c.velY  -= 5.5 * delta;
    c.x     += c.velX  * delta;
    c.y     += c.velY  * delta;
    c.z     += c.velZ  * delta;
    c.rotY  += c.rotVelY * delta;
    c.velX  *= 0.98;
    c.velZ  *= 0.98;

    const lifeT = c.age / c.maxAge;
    clipAlphaArr[i] = lifeT < 0.3
      ? 1.0
      : Math.max(0, 1.0 - (lifeT - 0.3) / 0.7);

    clipHeightArr[i] = c.height;
    clipWidthArr[i]  = c.width;
    clipLeanArr[i]   = c.lean;
    clipIsRainArr[i] = c.isRain ? 1.0 : 0.0;

    _cd.position.set(c.x, Math.max(0, c.y), c.z);
    _cd.rotation.set(c.tiltX, c.rotY, c.tiltZ);
    _cd.scale.setScalar(1);
    _cd.updateMatrix();
    clipMesh.setMatrixAt(i, _cd.matrix);
  }

  if (activeClips.length > 0) {
    clipMesh.instanceMatrix.needsUpdate = true;
    clipBladeGeo.attributes.aClipHeight.needsUpdate  = true;
    clipBladeGeo.attributes.aClipWidth.needsUpdate   = true;
    clipBladeGeo.attributes.aClipLean.needsUpdate    = true;
    clipBladeGeo.attributes.aClipAlpha.needsUpdate   = true;
    clipBladeGeo.attributes.aClipIsRain.needsUpdate  = true;
  }
}

// ── Render loop ─────────────────────────────────────────────────────────────
function hideLoadingScreen() {
  if (sceneReady) return;
  const overlay = document.getElementById('loading-overlay');
  if (!overlay) return;
  sceneReady = true;
  overlay.classList.add('hidden');
  customCursor.style.display = 'block';
  syncCustomCursorVisibility();
  setTimeout(() => overlay.remove(), 900);
}

function tryHideLoader() {
  if (frameReady && timerReady) hideLoadingScreen();
}

setTimeout(() => {
  timerReady = true;
  tryHideLoader();
}, LOADING_MIN_MS);

function animate() {
  if (devMode && fpsEl) {
    fpsFrames++;
    const fpsNow = performance.now();
    if (fpsNow - fpsIntervalStart >= 1000) {
      fpsEl.textContent = Math.round(fpsFrames * 1000 / (fpsNow - fpsIntervalStart)) + ' FPS';
      fpsFrames = 0;
      fpsIntervalStart = fpsNow;
    }
  }

  if (!sceneReady) {
    updateCustomCursorScale();
    renderer.render(scene, camera);
    return;
  }

  const frameStart = devMode ? performance.now() : 0;
  const delta = clock.getDelta();
  const safeDelta = Math.min(delta, 0.05);
  const elapsed = clock.elapsedTime;

  updateGust(safeDelta);

  const springTarget    = gust.strength;
  const springStiffness = SPRING_STIFFNESS_BASE + rainT * (SPRING_STIFFNESS_RAIN - SPRING_STIFFNESS_BASE);
  const springDamping   = SPRING_DAMPING_BASE   + rainT * (SPRING_DAMPING_RAIN   - SPRING_DAMPING_BASE);
  const springForce = (springTarget - springPos) * springStiffness;
  // High damping only after spring has had 5s in CALM; rain version stays bent longer
  const activeDamping = (gust.state === 'CALM' && gust.phaseTimer > 5.0) ? springDamping * 4 : springDamping;
  const dampForce = springVel * activeDamping;
  springVel += (springForce - dampForce) * safeDelta;
  springPos += springVel * safeDelta;

  if (gust.state === 'ACTIVE' || gust.state === 'FADING') {
    gustBlend = Math.min(1.0, gustBlend + safeDelta * 2.0);
  } else if (gust.state === 'BUILDING') {
    gustBlend = Math.min(1.0, gustBlend + safeDelta * 1.5);
  } else {
    const springSettled = Math.abs(springPos) < 0.03 && Math.abs(springVel) < 0.05;
    if (springSettled) {
      gustBlend = Math.max(0.0, gustBlend - safeDelta * 3.0);
    }
  }
  grassMaterial.uniforms.uGustBlend.value = gustBlend * (1.0 - rainT);

  grassMaterial.uniforms.uTime.value = elapsed;
  grassMaterial.uniforms.uGustFrontX.value = gust.frontX;
  grassMaterial.uniforms.uGustStrength.value = springPos;
  currentWidth += (gust.width - currentWidth) * Math.min(1, safeDelta * 1.5);
  grassMaterial.uniforms.uGustWidth.value = currentWidth;
  const dirLerp = Math.min(1, safeDelta / Math.max(0.1, gust.buildDuration) * 3);
  currentDirX += (gust.dirX - currentDirX) * dirLerp;
  currentDirZ += (gust.dirZ - currentDirZ) * dirLerp;
  grassMaterial.uniforms.uGustDirX.value = currentDirX;
  grassMaterial.uniforms.uGustDirZ.value = currentDirZ;

  // Rain suppression: ambient sway and trail strength scale with rainT
  const rainSuppression = 1.0 - rainT * 0.85;
  grassMaterial.uniforms.uAmbientDirX.value    = 0.92 * rainSuppression;
  grassMaterial.uniforms.uAmbientDirZ.value    = 0.38 * rainSuppression;
  grassMaterial.uniforms.uTrailStrengthX.value = 0.8  * (1.0 - rainT * 0.25);
  grassMaterial.uniforms.uTrailStrengthZ.value = 0.8  * (1.0 - rainT * 0.25);

  const todActive = todTransitioning;
  if (todActive && transitionFrom && transitionTo) {
    todTransitionT = Math.min(1.0, todTransitionT + safeDelta / TOD_TRANS_DUR);
    const ease = todTransitionT < 0.5
      ? 2 * todTransitionT * todTransitionT
      : 1 - Math.pow(-2 * todTransitionT + 2, 2) / 2;

    todT = isNight ? ease : 1 - ease;

    const u = grassMaterial.uniforms;
    u.uBentBase.value.lerpColors(transitionFrom.bentBase,  transitionTo.bentBase,  ease);
    u.uBentMid.value.lerpColors(transitionFrom.bentMid,   transitionTo.bentMid,   ease);
    u.uBentTipLo.value.lerpColors(transitionFrom.bentTipLo,transitionTo.bentTipLo,ease);
    u.uBentTipHi.value.lerpColors(transitionFrom.bentTipHi,transitionTo.bentTipHi,ease);

    if (todTransitionT >= 1.0) {
      todTransitioning = false;
      todT = isNight ? 1 : 0;
    }
  }

  if (rainTransitioning) {
    const nowMs = performance.now();
    const p = Math.min((nowMs - rainTransStart) / RAIN_TRANS_DUR, 1.0);
    const ease = p < 0.5 ? 2 * p * p : -1 + (4 - 2 * p) * p;
    rainT = isRain ? ease : 1.0 - ease;
    if (p >= 1.0) {
      rainTransitioning = false;
      if (!isRain) {
        if (rainAudioEl && !rainAudioEl.paused) rainAudioEl.pause();
        stopRainGustDsp();
        setRainInScene(false);
      }
    }
    applyWeather();
  } else if (todActive) {
    applyWeather();
  }

  if (isNight) {
    if (fireflyDelay > 0) {
      fireflyDelay -= safeDelta;
    } else {
      fireflyFadeT = Math.min(1.0, fireflyFadeT + safeDelta / 2.0);
    }
  } else {
    fireflyFadeT = Math.max(0.0, fireflyFadeT - safeDelta / 3.0);
  }
  fireflyMaterial.uniforms.uVisible.value = fireflyFadeT;
  fireflyGlowMat.uniforms.uGlowIntensity.value = fireflyFadeT;
  fireflyGlowMat.uniforms.uVisible.value = fireflyFadeT;

  updateCursorDirection();
  updateCustomCursorScale();

  // ── RT idle-skip tracking ────────────────────────────────────────────────
  const cursorOnField = cursorTrailUV.x >= 0 && cursorTrailUV.x <= 1 &&
                        cursorTrailUV.y >= 0 && cursorTrailUV.y <= 1;
  if (cursorOnField) {
    trailOffFieldFrames = 0;
    trailHasResidual    = true;
  } else {
    trailOffFieldFrames++;
    if (trailOffFieldFrames >= TRAIL_FADE_FRAMES) trailHasResidual = false;
  }
  if (mowHasActive && (mowElapsed - lastMowTime) > MAX_REGROW_TIME) mowHasActive = false;
  // ────────────────────────────────────────────────────────────────────────

  updateTrail();
  updateMow(safeDelta);
  if (cutDragGain && audioCtx) {
    const onGrass = cursorTrailUV.x >= 0 && cursorTrailUV.x <= 1 &&
                    cursorTrailUV.y >= 0 && cursorTrailUV.y <= 1;
    let cutTarget = 0;
    if (!audioMuted && (isMouseDown || isTouchMowing) && onGrass) {
      const speedFactor = Math.pow(Math.min(1, smoothSpeed * 0.6), 0.5);
      cutTarget = 0.26 * speedFactor;
    }
    cutDragGain.gain.setTargetAtTime(cutTarget, audioCtx.currentTime, 0.04);
  }
  updateAudioFromTrail();

  updateFireflies(
    safeDelta,
    elapsed,
    springPos,
    currentDirX,
    currentDirZ,
    cursorWorldX,
    cursorWorldZ,
    smoothVelocity,
    cursorTrailUV.x >= 0 && cursorTrailUV.x <= 1 &&
    cursorTrailUV.y >= 0 && cursorTrailUV.y <= 1
  );

  updateClips(safeDelta);

  updateFireflyGlowInstances(safeDelta);

  if (rainT > 0) updateRain(safeDelta);

  if (rainAudioGain && audioCtx && !audioMuted && rainTransitioning) {
    rainAudioGain.gain.setTargetAtTime(rainT * 0.12, audioCtx.currentTime, 0.15);
  }
  if (musicMasterGain && audioCtx && rainTransitioning) {
    musicMasterGain.gain.setTargetAtTime(1.0 - rainT, audioCtx.currentTime, 0.15);
  }

  grassNear.updateMatrixWorld();
  grassFar.updateMatrixWorld();
  grassVeryFar.updateMatrixWorld();
  camera.updateMatrixWorld();
  grassMaterial.uniforms.projectionMatrix.value.copy(camera.projectionMatrix);
  grassMaterial.uniforms.modelViewMatrix.value.copy(camera.matrixWorldInverse).multiply(grassNear.matrixWorld);
  clipMat.uniforms.projectionMatrix.value.copy(camera.projectionMatrix);
  clipMat.uniforms.modelViewMatrix.value.copy(camera.matrixWorldInverse);
  fireflyGlowMat.uniforms.projectionMatrix.value.copy(camera.projectionMatrix);
  fireflyGlowMat.uniforms.modelViewMatrix.value.copy(camera.matrixWorldInverse);

  const preRender = devMode ? performance.now() : 0;
  renderer.render(scene, camera);
  if (devMode) {
    const renderMs = performance.now() - preRender;
    const cpuMs = preRender - frameStart;
    renderDiagFrames++;
    if (renderDiagFrames % 120 === 0) {
      console.log(
        'drawCalls:', renderer.info.render.calls,
        'triangles:', renderer.info.render.triangles,
        'geometries:', renderer.info.memory.geometries,
        'textures:', renderer.info.memory.textures,
        'renderMs:', renderMs.toFixed(2),
        'cpuMs:', cpuMs.toFixed(2),
        'perfMode:', perfMode,
        'DPR:', renderer.getPixelRatio(),
        'canvas:', renderer.domElement.width + 'x' + renderer.domElement.height,
        'mapTex:', mapTexSize,
        'blades:', grassNear.count + grassFar.count + grassVeryFar.count,
        'rainT:', rainT
      );
    }
  }
}

renderer.setAnimationLoop(() => {
  renderer.render(scene, camera);
  renderer.setAnimationLoop(animate);
  frameReady = true;
  tryHideLoader();
});

if (devMode) {
  logPerfDiagnostics('init');
  console.log('shadowMap:', renderer.shadowMap.enabled);
}
console.log(
  `Touch Grass WebGL — ${grassNear.count + grassFar.count + grassVeryFar.count} instanced blades`,
  perfMode ? '(perf)' : '(HQ)'
);
</script>

  <div id="loading-stack">
    <div id="loading-audio-hint">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        aria-hidden="true">
        <path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/>
      </svg>
      <span>Headphones &amp; audio<br>strongly recommended</span>
    </div>
    <div id="loading-bar-track">
      <div id="loading-bar-fill"></div>
    </div>
  </div>
</div>
</body>
