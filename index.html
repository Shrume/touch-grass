<head>

<title>Touch Grass</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
* { cursor: none !important; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #040a01;
  cursor: none !important;
}
canvas {
  display: block;
  position: fixed;
  inset: 0;
  cursor: none !important;
}

#custom-cursor {
  position: fixed;
  left: 0;
  top: 0;
  width: 42px;
  height: 42px;
  pointer-events: none;
  z-index: 9999;
  opacity: 0;
  display: none;
  transform: translate(-50%, -50%) scale(1);
}
#custom-cursor img,
#custom-cursor-hand,
#custom-cursor-sci {
  display: block;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
#custom-cursor img[hidden] {
  display: none;
}

#fps-dev {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 200;
  font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  font-size: 12px;
  color: #ffffff;
  pointer-events: none;
}

#ff-dev-panel {

  font-size: 11px;

  pointer-events: auto;
  border-radius: 4px;
  overflow: hidden;
}
#ff-dev-panel .ff-dev-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 8px 12px;
  font: inherit;
  font-size: 12px;
  color: #fff;
  background: transparent;
  border: none;
  cursor: pointer;
  text-align: left;
  opacity: 0.9;
}
#ff-dev-panel .ff-dev-header:hover {

}
#ff-dev-panel .ff-dev-chevron {

.ui-btn {

     <a href="https://pixabay.com/users/freesound_community-46691455/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=17064" target="_blank">freesound_community</a></p>

<script type="module">
import * as THREE from 'three';

const devMode = window.location.search.includes('dev');
const fpsEl = document.getElementById('fps-dev');
if (fpsEl) fpsEl.style.display = devMode ? 'block' : 'none';
let fpsFrames = 0;
let fpsIntervalStart = performance.now();

let FIREFLY_PERMANENT = 280;
let FIREFLY_TEMP      = 40;
let FIREFLY_COUNT     = FIREFLY_PERMANENT + FIREFLY_TEMP;
let FF_SIZE_BASE      = 100;
let FF_BRI_MIN        = 2;
let FF_BRI_RANGE      = 6;
let FF_GRASS_FALLOFF  = 1.25;
let FF_GRASS_SCALE    = 0.35;
let FF_REPEL_RADIUS   = 17;
let FF_NIGHT_DELAY    = 2;

const BLADE_NEAR      = 145000;
const BLADE_FAR       = 100000;
const BLADE_VERY_FAR  = 50000;
const BLADE_COUNT     = BLADE_NEAR + BLADE_FAR;

let fieldMinX, fieldMaxX, fieldMinZ, fieldMaxZ;

// ── Scene ─────────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.0));
document.body.appendChild(renderer.domElement);

// ── Mouse trail (ping-pong render target) ───────────────────────────────────
const trailRTA = new THREE.WebGLRenderTarget(256, 256);
const trailRTB = new THREE.WebGLRenderTarget(256, 256);
let trailRead = trailRTA;
let trailWrite = trailRTB;

const trailScene = new THREE.Scene();
const trailCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const trailVertShader = /* glsl */`
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position.xy, 0.0, 1.0);
}
`;

const trailFragShader = /* glsl */`
uniform vec2 uMouse;
uniform vec2 uCursorDir;
uniform float uCursorSpeed;
uniform sampler2D uPrevTrail;
uniform float uFade;
uniform float uBrushSize;
uniform float uBrushStrength;
uniform float uFieldAspect;
varying vec2 vUv;
void main() {
  vec4 prev = texture2D(uPrevTrail, vUv);
  prev.b *= uFade;
  prev.rg = mix(vec2(0.5), prev.rg, prev.b);
  if (prev.b < 0.012) prev = vec4(0.5, 0.5, 0.0, 1.0);

  vec2 encodedDir = uCursorDir * 0.5 + 0.5;

  float farBoost = 1.0 + (1.0 - uMouse.y) * 0.9;
  float boostedBrush = uBrushSize * farBoost;
  float dist = length((vUv - uMouse) * vec2(uFieldAspect, 1.0));
  float brush = smoothstep(boostedBrush, 0.0, dist);
  float boostedStrength = (uBrushStrength * farBoost) * (0.4 + uCursorSpeed * 0.6);
  brush *= boostedStrength;

  vec2 existingDir = prev.rg * 2.0 - 1.0;
  float trailAlignment = dot(existingDir, uCursorDir);
  float dirMixRate = brush * (trailAlignment > 0.0 ? 0.35 : 0.08);

  vec3 newColor = prev.rgb;
  if (brush > 0.0) {
    newColor.r = mix(prev.r, encodedDir.x, dirMixRate);
    newColor.g = mix(prev.g, encodedDir.y, dirMixRate);
    newColor.b = min(1.0, prev.b + brush);
  } else {
    newColor.b = prev.b;
  }
  gl_FragColor = vec4(newColor, 1.0);
}
`;

const trailMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uMouse:         { value: new THREE.Vector2(-10, -10) },
    uCursorDir:     { value: new THREE.Vector2(0, 0) },
    uCursorSpeed:   { value: 0 },
    uPrevTrail:     { value: trailRead.texture },
    uFade:          { value: 0.996 },
    uBrushSize:     { value: 0.007 },
    uBrushStrength: { value: 0.85 },
    uFieldAspect:   { value: 1.0 },
  },
  vertexShader: trailVertShader,
  fragmentShader: trailFragShader,
});

const trailQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), trailMaterial);
trailScene.add(trailQuad);

// ── Mow map (permanent cuts, no fade) ───────────────────────────────────────
const mowRT  = new THREE.WebGLRenderTarget(256, 256, {
  type:   THREE.HalfFloatType,
  format: THREE.RGBAFormat,
});
const mowRTB = new THREE.WebGLRenderTarget(256, 256, {
  type:   THREE.HalfFloatType,
  format: THREE.RGBAFormat,
});
let mowRead  = mowRT;
let mowWrite = mowRTB;

const mowFragShader = /* glsl */`
uniform sampler2D uPrevMow;
uniform vec2 uMouse;
uniform vec2 uMousePrev;
uniform float uBrushSize;
uniform float uCutMode;
uniform float uDecayOnly;
uniform float uDecayDelta;
uniform float uFieldAspect;
varying vec2 vUv;
void main() {
  float prev = texture2D(uPrevMow, vUv).r;
  if (uDecayOnly > 0.5) {
    float faded = max(0.0, prev - uDecayDelta);
    gl_FragColor = vec4(faded, 0.0, 0.0, 1.0);
    return;
  }
  vec2 pa = vUv - uMousePrev;
  pa.x *= uFieldAspect;
  vec2 ba = uMouse - uMousePrev;
  ba.x *= uFieldAspect;
  float baLen2 = dot(ba, ba);
  float dist;
  if (baLen2 < 0.00001) {
    dist = length(pa);
  } else {
    float h = clamp(dot(pa, ba) / baLen2, 0.0, 1.0);
    dist = length(pa - ba * h);
  }
  float brush = uCutMode > 0.5
    ? step(dist, uBrushSize * 0.6)
    : 0.0;
  gl_FragColor = vec4(max(prev, brush), 0.0, 0.0, 1.0);
}
`;

const mowMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uPrevMow:    { value: mowRead.texture },
    uMouse:      { value: new THREE.Vector2(-10, -10) },
    uMousePrev:  { value: new THREE.Vector2(-10, -10) },
    uBrushSize:  { value: 0.007 },
    uCutMode:    { value: 0.0 },
    uDecayOnly:  { value: 0.0 },
    uDecayDelta: { value: 0.0 },
    uFieldAspect: { value: 1.0 },
  },
  vertexShader:   trailVertShader,
  fragmentShader: mowFragShader,
});

const mowScene = new THREE.Scene();
const mowMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mowMaterial);
mowScene.add(mowMesh);

let isMouseDown = false;
let isTouchMowing = false;
let touch0PrevX = 0;
let touch0PrevY = 0;
let touch1PrevX = 0;
let touch1PrevY = 0;
let touch0HasPrev = false;
let touch1HasPrev = false;

const MOW_CELLS_X = 48;
const MOW_CELLS_Z = 48;
const mowCells    = new Float32Array(MOW_CELLS_X * MOW_CELLS_Z);
let   mowElapsed  = 0;

function mowCellIdx(wx, wz) {
  const u = Math.max(0, Math.min(1, (wx - fieldMinX) / (fieldMaxX - fieldMinX)));
  const v = Math.max(0, Math.min(1, (wz - fieldMinZ) / (fieldMaxZ - fieldMinZ)));
  const cx = Math.min(MOW_CELLS_X - 1, Math.floor(u * MOW_CELLS_X));
  const cz = Math.min(MOW_CELLS_Z - 1, Math.floor(v * MOW_CELLS_Z));
  return cz * MOW_CELLS_X + cx;
}

function mowCellCut(wx, wz) {
  const idx = mowCellIdx(wx, wz);
  if (idx < 0) return false;
  if (mowCells[idx] <= 0) return false;
  const elapsed = mowElapsed - mowCells[idx];
  return elapsed < 10.0;
}

function mowCellMark(wx, wz) {
  mowCells[mowCellIdx(wx, wz)] = mowElapsed;
}

function applyMowAtPoint(worldX, worldZ, distWorld, clipsThisFrame) {
  const u = (worldX - fieldMinX) / (fieldMaxX - fieldMinX);
  const v = (worldZ - fieldMinZ) / (fieldMaxZ - fieldMinZ);
  if (u < 0 || u > 1 || v < 0 || v > 1) return clipsThisFrame;
  const idx = mowCellIdx(worldX, worldZ);
  const recentlyCut = mowCells[idx] > 0 && (mowElapsed - mowCells[idx]) < 3.0;
  if (!recentlyCut && clipsThisFrame < 3) {
    spawnClips(worldX, worldZ, 1.0);
    fireCutSnip();
    clipsThisFrame++;
  }
  mowCellMark(worldX, worldZ);
  return clipsThisFrame;
}

function swapMowRT() {
  const tmp = mowRead;
  mowRead = mowWrite;
  mowWrite = tmp;
  grassMaterial.uniforms.uMowMap.value = mowRead.texture;
}

function renderMowPass(endU, endV, startU, startV, cutMode, decayOnly) {
  mowMaterial.uniforms.uPrevMow.value = mowRead.texture;
  mowMaterial.uniforms.uMouse.value.set(endU, endV);
  mowMaterial.uniforms.uMousePrev.value.set(startU, startV);
  mowMaterial.uniforms.uCutMode.value = cutMode ? 1.0 : 0.0;
  mowMaterial.uniforms.uDecayOnly.value = decayOnly ? 1.0 : 0.0;
  renderer.setRenderTarget(mowWrite);
  renderer.render(mowScene, trailCamera);
  renderer.setRenderTarget(null);
  swapMowRT();
}

function updateMow(safeDelta) {
  mowElapsed += safeDelta;
  mowMaterial.uniforms.uBrushSize.value = trailMaterial.uniforms.uBrushSize.value;
  mowMaterial.uniforms.uDecayDelta.value = safeDelta / 20.0;
  renderMowPass(
    cursorTrailUV.x, cursorTrailUV.y,
    prevMowUV.x, prevMowUV.y,
    false, true
  );

  const cutting = isMouseDown || isTouchMowing;
  const onGrass =
    cursorTrailUV.x >= 0 && cursorTrailUV.x <= 1 &&
    cursorTrailUV.y >= 0 && cursorTrailUV.y <= 1;

  if (cutting && onGrass) {
    const endU = cursorTrailUV.x;
    const endV = cursorTrailUV.y;
    const startU = prevMowUV.x;
    const startV = prevMowUV.y;
    const fieldW = fieldMaxX - fieldMinX;
    const fieldD = fieldMaxZ - fieldMinZ;
    const brush = mowMaterial.uniforms.uBrushSize.value;
    const distWorld = Math.hypot(
      (endU - startU) * fieldW,
      (endV - startV) * fieldD
    );
    const stepLenWorld = brush * 0.25 * Math.min(fieldW, fieldD);
    const steps = Math.min(48, Math.max(1, Math.ceil(distWorld / stepLenWorld)));

    const brushRadius = brush * 0.6;
    const pad = 2;
    let clipsThisFrame = 0;
    for (let i = 1; i <= steps; i++) {
      const t0 = (i - 1) / steps;
      const t1 = i / steps;
      const u1 = startU + (endU - startU) * t1;
      const v1 = startV + (endV - startV) * t1;
      if (i === 1) {
        const u0 = startU + (endU - startU) * t0;
        const v0 = startV + (endV - startV) * t0;
        clipsThisFrame = applyMowAtPoint(fieldMinX + u0 * fieldW, fieldMinZ + v0 * fieldD, distWorld, clipsThisFrame);
      }
      clipsThisFrame = applyMowAtPoint(fieldMinX + u1 * fieldW, fieldMinZ + v1 * fieldD, distWorld, clipsThisFrame);
      const bx = Math.floor((u1 - brushRadius) * 256) - pad;
      const by = Math.floor((v1 - brushRadius) * 256) - pad;
      const bw = Math.ceil(brushRadius * 2 * 256) + pad * 2;
      const bh = Math.ceil(brushRadius * 2 * 256) + pad * 2;
      renderer.setScissorTest(true);
      renderer.setScissor(Math.max(0, bx), Math.max(0, by), Math.min(256, bw), Math.min(256, bh));
      renderMowPass(
        startU + (endU - startU) * t1,
        startV + (endV - startV) * t1,
        startU + (endU - startU) * t0,
        startV + (endV - startV) * t0,
        true, false
      );
      renderer.setScissorTest(false);
    }
    prevMowUV.set(endU, endV);
  } else if (onGrass) {
    prevMowUV.set(cursorTrailUV.x, cursorTrailUV.y);
  }
}

};

function spawnGust() {
  const angle = (Math.random() - 0.5) * 0.6;
  gust.dirX = Math.cos(angle) * (Math.random() < 0.8 ? 1 : -1);
  gust.dirZ = Math.sin(angle);
  gust.speed = 6 + Math.random() * 12;
  gust.targetStrength = 0.3 + Math.random() * 0.7;
  gust.width = 180 + Math.random() * 220;
  gust.buildDuration = 1.5 + Math.random() * 2.5;
  gust.fadeDuration = 2.0 + Math.random() * 3.0;
  gust.frontX = gust.dirX > 0 ? fieldMinX - 20 : fieldMaxX + 20;
  gust.strength = 0;
  gust.phaseTimer = 0;
  gust.state = 'BUILDING';
}

function updateGust(delta) {
  gust.phaseTimer += delta;

  if (gust.state === 'CALM') {
    gust.calmTimer -= delta;
    gust.strength = 0;
    const springSettled = Math.abs(springPos) < 0.03 && Math.abs(springVel) < 0.05;
    if (gust.calmTimer <= 0 && (springSettled || gust.phaseTimer > 8.0)) spawnGust();
  } else if (gust.state === 'BUILDING') {
    const t = Math.min(1, gust.phaseTimer / gust.buildDuration);
    gust.strength = t * t * gust.targetStrength;
    gust.frontX += gust.dirX * gust.speed * delta;
    if (t >= 1) { gust.state = 'ACTIVE'; gust.phaseTimer = 0; }
  } else if (gust.state === 'ACTIVE') {
    gust.frontX += gust.dirX * gust.speed * delta;
    gust.strength = gust.targetStrength;
    if (gust.dirX > 0 ? gust.frontX > fieldMaxX + 20 : gust.frontX < fieldMinX - 20) {
      gust.state = 'FADING';
      gustFadeStart = gust.strength;
      gust.phaseTimer = 0;
    }
  } else if (gust.state === 'FADING') {
    // Step to 0 immediately — spring handles the visual recovery with overshoot
    gust.strength = 0;
    gust.frontX += gust.dirX * gust.speed * delta;
    if (gust.phaseTimer >= 0.05) {
      gust.state = 'CALM';
      gust.calmTimer = 0.5 + Math.random() * 2.5;
      gust.phaseTimer = 0;
    }
  }
}

function initCutAudio() {
  if (cutDragSrc || !audioCtx) return;
  const cutDragLen = audioCtx.sampleRate * 4;
  const cutDragBuf = audioCtx.createBuffer(1, cutDragLen, audioCtx.sampleRate);
  const cutDragData = cutDragBuf.getChannelData(0);
  let b0=0, b1=0, b2=0;
  for (let i = 0; i < cutDragLen; i++) {
    const w = Math.random() * 2 - 1;
    b0 = 0.99886*b0 + w*0.0555179;
    b1 = 0.99332*b1 + w*0.0750759;
    b2 = 0.96900*b2 + w*0.1538520;
    cutDragData[i] = (b0 + b1 + b2 + w*0.0084) * 0.2;
  }
  cutDragSrc = audioCtx.createBufferSource();
  cutDragSrc.buffer = cutDragBuf;
  cutDragSrc.loop = true;

  const cutHp = audioCtx.createBiquadFilter();
  cutHp.type = 'highpass'; cutHp.frequency.value = 2800;
  const cutLp = audioCtx.createBiquadFilter();
  cutLp.type = 'lowpass'; cutLp.frequency.value = 8500;

  cutDragGain = audioCtx.createGain();
  cutDragGain.gain.value = 0;

  cutDragSrc.connect(cutHp);
  cutHp.connect(cutLp);
  cutLp.connect(cutDragGain);
  cutDragGain.connect(audioCtx.destination);
  cutDragSrc.start();
}

function fireCutSnip() {
  if (!audioCtx || audioMuted) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const now = audioCtx.currentTime;
  if (now - lastSnipTime < 0.05) return;
  lastSnipTime = now;
  const sr  = audioCtx.sampleRate;
  const dur = 0.055;
  const buf = audioCtx.createBuffer(1, Math.ceil(dur * sr), sr);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;

  const src = audioCtx.createBufferSource(); src.buffer = buf;

  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 1300; bp.Q.value = 1.6;

  const ws = audioCtx.createWaveShaper();
  const curve = new Float32Array(128);
  for (let i = 0; i < 128; i++) {
    const x = (i / 63.5) - 1;
    curve[i] = Math.tanh(x * 2.2) * 0.78;
  }
  ws.curve = curve;

  const g = audioCtx.createGain();
  src.connect(bp); bp.connect(ws); ws.connect(g);
  g.connect(audioCtx.destination);

  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.34, now + 0.002);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  src.start(now); src.stop(now + dur + 0.01);
}

function updateCursorDirection() {
  const onGrass =
    cursorTrailUV.x >= 0 && cursorTrailUV.x <= 1 &&
    cursorTrailUV.y >= 0 && cursorTrailUV.y <= 1;

  if (onGrass) {
    const dxRaw = cursorWorldX - prevCursorWorldX;
    const dzRaw = cursorWorldZ - prevCursorWorldZ;
    const rawSpeed = Math.sqrt(dxRaw * dxRaw + dzRaw * dzRaw);
    smoothSpeed = smoothSpeed * 0.65 + rawSpeed * 0.35;
    if (rawSpeed > 0.08) {
      const newDirX = dxRaw / rawSpeed;
      const newDirZ = dzRaw / rawSpeed;
      const alignment = newDirX * smoothDirX + newDirZ * smoothDirZ;
      const mixRate = alignment > 0 ? 0.12 : 0.03;
      smoothDirX = smoothDirX * (1 - mixRate) + newDirX * mixRate;
      smoothDirZ = smoothDirZ * (1 - mixRate) + newDirZ * mixRate;
    }
    prevCursorWorldX = cursorWorldX;
    prevCursorWorldZ = cursorWorldZ;
  }

  const cursorSpeed = Math.min(1.0, smoothSpeed * 0.8);
  trailMaterial.uniforms.uCursorDir.value.set(smoothDirX, smoothDirZ);
  trailMaterial.uniforms.uCursorSpeed.value = cursorSpeed;
  grassMaterial.uniforms.uCursorSpeed.value = cursorSpeed;
}

function updateMouseFromEvent(clientX, clientY) {
  tryInitAudio();
  const rect = renderer.domElement.getBoundingClientRect();
  mouseScreenX = clientX;
  mouseScreenY = clientY;
  mouseNdc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  mouseNdc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouseNdc, camera);
  if (raycaster.ray.intersectPlane(groundPlane, hitPoint)) {
    cursorWorldX = hitPoint.x;
    cursorWorldZ = hitPoint.z;
    cursorTrailUV.x = (hitPoint.x - fieldMinX) / (fieldMaxX - fieldMinX);
    cursorTrailUV.y = (hitPoint.z - fieldMinZ) / (fieldMaxZ - fieldMinZ);
    trailMaterial.uniforms.uMouse.value.set(cursorTrailUV.x, cursorTrailUV.y);
  }
}

function seedPointerVelocity(clientX, clientY) {
  lastMouseX = clientX;
  lastMouseY = clientY;
}

function twoFingerSameDirection(t0, t1) {
  if (!touch0HasPrev || !touch1HasPrev) return false;
  const v0x = t0.clientX - touch0PrevX;
  const v0y = t0.clientY - touch0PrevY;
  const v1x = t1.clientX - touch1PrevX;
  const v1y = t1.clientY - touch1PrevY;
  const v0mag = Math.hypot(v0x, v0y);
  const v1mag = Math.hypot(v1x, v1y);
  if (v0mag < 0.5 || v1mag < 0.5) return false;
  return v0x * v1x + v0y * v1y > 0;
}

function storeTouchFingerPrev(t0, t1) {
  touch0PrevX = t0.clientX;
  touch0PrevY = t0.clientY;
  touch1PrevX = t1.clientX;
  touch1PrevY = t1.clientY;
  touch0HasPrev = true;
  touch1HasPrev = true;
}

function handleTouchStart(e) {
  e.preventDefault();
  tryInitAudio();
  if (e.touches.length === 1) {
    isTouchMowing = false;
    touch0HasPrev = false;
    touch1HasPrev = false;
    const t = e.touches[0];
    seedPointerVelocity(t.clientX, t.clientY);
    updateMouseFromEvent(t.clientX, t.clientY);
  } else if (e.touches.length === 2) {
    isTouchMowing = false;
    const t0 = e.touches[0];
    const t1 = e.touches[1];
    storeTouchFingerPrev(t0, t1);
    const midX = (t0.clientX + t1.clientX) * 0.5;
    const midY = (t0.clientY + t1.clientY) * 0.5;
    seedPointerVelocity(midX, midY);
    updateMouseFromEvent(midX, midY);
    prevMowUV.set(cursorTrailUV.x, cursorTrailUV.y);
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    isTouchMowing = false;
    const t = e.touches[0];
    updateMouseFromEvent(t.clientX, t.clientY);
  } else if (e.touches.length === 2) {
    const t0 = e.touches[0];
    const t1 = e.touches[1];
    const sameDir = twoFingerSameDirection(t0, t1);
    const wasTouchMowing = isTouchMowing;
    isTouchMowing = sameDir;
    const midX = (t0.clientX + t1.clientX) * 0.5;
    const midY = (t0.clientY + t1.clientY) * 0.5;
    if (sameDir) {
      updateMouseFromEvent(midX, midY);
      if (!wasTouchMowing) prevMowUV.set(cursorTrailUV.x, cursorTrailUV.y);
    }
    storeTouchFingerPrev(t0, t1);
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  if (e.touches.length === 0) {
    isTouchMowing = false;
    touch0HasPrev = false;
    touch1HasPrev = false;
    clearCursorTrail();
  } else if (e.touches.length === 1) {
    isTouchMowing = false;
    touch0HasPrev = false;
    touch1HasPrev = false;
    const t = e.touches[0];
    seedPointerVelocity(t.clientX, t.clientY);
    updateMouseFromEvent(t.clientX, t.clientY);
  } else if (e.touches.length === 2) {
    isTouchMowing = false;
    const t0 = e.touches[0];
    const t1 = e.touches[1];
    storeTouchFingerPrev(t0, t1);
  }
}

function updateAudioFromTrail() {
  if (!audioReady) return;

  let trailIntensity = 0;
  const onGrass =
    cursorTrailUV.x >= 0 && cursorTrailUV.x <= 1 &&
    cursorTrailUV.y >= 0 && cursorTrailUV.y <= 1;

  if (onGrass) {
    const px = Math.floor(cursorTrailUV.x * 256);
    const py = Math.floor(cursorTrailUV.y * 256);
    const x = Math.max(0, Math.min(248, px - 4));
    const y = Math.max(0, Math.min(248, py - 4));
    renderer.readRenderTargetPixels(trailRead, x, y, 8, 8, trailPixelBuf);
    let sum = 0;
    for (let i = 0; i < trailPixelBuf.length; i += 4) sum += trailPixelBuf[i + 2] / 255;
    trailIntensity = Math.min(1, sum / 64);
  }

  const dx = mouseScreenX - lastMouseX;
  const dy = mouseScreenY - lastMouseY;
  const velocity = Math.sqrt(dx * dx + dy * dy);
  lastMouseX = mouseScreenX;
  lastMouseY = mouseScreenY;

  smoothVelocity = smoothVelocity * 0.75 + velocity * 0.25;

  const cursorActivity = Math.min(1, smoothVelocity * 0.04) * trailIntensity;

  const cursorDepth = Math.max(0, Math.min(1, cursorTrailUV.y));
  const distanceFade = 0.15 + 0.85 * cursorDepth;

  const overCut = onGrass && mowCellCut(cursorWorldX, cursorWorldZ);
  const g1Base  = overCut ? 0.36 : 0.40;
  const g2Base  = overCut ? 0.027 : 0.18;
  const g1 = cursorActivity * g1Base * distanceFade;
  const g2 = cursorActivity * g2Base * distanceFade;
  gain1.gain.setTargetAtTime(audioMuted ? 0 : g1, audioCtx.currentTime, 0.10);
  gain2.gain.setTargetAtTime(audioMuted ? 0 : g2, audioCtx.currentTime, 0.10);
  const bpBase = overCut ? 4200 : 2000;
  const bpRange = overCut ? 1800 : 2500;
  bandpass.frequency.setTargetAtTime(
    bpBase + cursorActivity * bpRange, audioCtx.currentTime, 0.12);
  bandpass.Q.setTargetAtTime(
    overCut ? 1.8 : 1.2, audioCtx.currentTime, 0.12);
  panner.pan.value = Math.max(-1, Math.min(1, (mouseScreenX / window.innerWidth) * 2 - 1));

  const gustAudioStrength = gust.strength;

  if (gustAudioStrength > smoothWindActivity) {
    smoothWindActivity = smoothWindActivity * 0.5 + gustAudioStrength * 0.5;
  } else {
    smoothWindActivity = smoothWindActivity * 0.96 + gustAudioStrength * 0.04;
  }

  if (windPanner) {
    windPanner.positionX.value = gust.frontX * 0.4;
    const gustProgress = Math.max(0, Math.min(1,
      (gust.frontX - fieldMinX) / (fieldMaxX - fieldMinX)));
    windPanner.positionZ.value = -80 + gustProgress * 40;
  }

  gainWhoosh.gain.value = audioMuted ? 0 : smoothWindActivity * 0.009;
  whooshFilter.frequency.value = 300 + smoothWindActivity * 250;
  whooshFilter.Q.value = 0.5;
  gainRustle.gain.value = audioMuted ? 0 : smoothWindActivity * 0.072;
  rustleFilter.frequency.value = 2400 + smoothWindActivity * 1600;
  rustleFilter.Q.value = 2.5 + smoothWindActivity * 1.5;
}

const FIELD_REFERENCE_ASPECT = 16 / 9;

function computeFieldBounds() {
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const boundsRaycaster = new THREE.Raycaster();

  function frustumGroundRect(camY, camZ, fov) {
    const boundsCam = new THREE.PerspectiveCamera(
      fov, FIELD_REFERENCE_ASPECT, 0.1, 200
    );
    boundsCam.position.set(0, camY, camZ);
    boundsCam.lookAt(0, CAM_LOOK_Y, CAM_LOOK_Z);
    boundsCam.updateProjectionMatrix();
    boundsCam.updateMatrixWorld(true);

    const hits = [];
    for (let xi = -1; xi <= 1; xi++) {
      for (let yi = -1; yi <= 1; yi++) {
        boundsRaycaster.setFromCamera(new THREE.Vector2(xi, yi), boundsCam);
        if (boundsRaycaster.ray.direction.y >= -0.001) continue;
        const pt = new THREE.Vector3();
        if (!boundsRaycaster.ray.intersectPlane(plane, pt)) continue;
        hits.push(pt);
      }
    }

    const xs = hits.map(p => p.x);
    const zs = hits.map(p => p.z);
    return {
      minX: Math.min(...xs),
      maxX: Math.max(...xs),
      minZ: Math.min(...zs),
      maxZ: Math.max(...zs),
    };
  }

  const locked = frustumGroundRect(CAM_INTRO_END_Y, CAM_INTRO_END_Z, CAM_INTRO_END_FOV);
  const visW = locked.maxX - locked.minX;
  const visD = locked.maxZ - locked.minZ;
  fieldMinX = locked.minX - visW * 0.06;
  fieldMaxX = locked.maxX + visW * 0.06;
  fieldMinZ = locked.minZ - visD * 0.06;
  fieldMaxZ = locked.maxZ + visD * 0.06;
}

const vertexShader = /* glsl */`
uniform float uTime;
uniform float uGustFrontX;
uniform float uGustStrength;
uniform float uGustWidth;
uniform float uGustBlend;
uniform float uGustDirX;
uniform float uGustDirZ;
uniform float uAmbientStrength;
uniform float uAmbientDirX;
uniform float uAmbientDirZ;
uniform sampler2D uTrail;
uniform float uCursorSpeed;
uniform float uTrailStrengthX;
uniform float uTrailStrengthZ;
uniform float uFieldMinX;
uniform float uFieldMinZ;
uniform float uFieldInvW;
uniform float uFieldInvD;
uniform sampler2D uMowMap;
uniform float uCutHeight;

attribute float aHeight;
attribute float aWidth;
attribute float aLean;
attribute float aRandom;

varying vec2 vUv;
varying float vRandom;
varying vec2 vWorldNormal;
varying float vCursorBend;
varying float vMow;
varying float vBladeHeight;
varying vec3 vWorldPos;

void main() {
  vUv = uv;
  vRandom = aRandom;
  vWorldNormal = vec2(cos(aLean), sin(aLean));

  vec3 pos = position;
  pos.x *= aWidth;
  pos.y *= aHeight;

  pos.x += sin(aLean * uv.y * 0.4) * aHeight * 0.25;
  pos.x += sin(aLean * pow(uv.y, 0.7)) * aHeight * 0.65;

  float instanceX = instanceMatrix[3][0];
  float instanceZ = instanceMatrix[3][2];

  vec2 fieldUV = vec2(
    (instanceX - uFieldMinX) * uFieldInvW,
    (instanceZ - uFieldMinZ) * uFieldInvD
  );
  float mowIntensity = texture2D(uMowMap, fieldUV).r;
  // Cut phase (0.5-1.0): stays at 50% height.
  // Regrowth phase (0.0-0.5): linearly returns to full height.
  float effectiveHeightScale;
  if (mowIntensity > 0.5) {
    effectiveHeightScale = 0.5;
  } else {
    effectiveHeightScale = 1.0 - mowIntensity;
  }

  if (mowIntensity > 0.01) {
    pos.y = min(pos.y, aHeight * effectiveHeightScale);
  }
  float effectiveScale = effectiveHeightScale;
  vMow = mowIntensity;
  vBladeHeight = aHeight;

  vec3 transformed = pos;

  float windUvY = mowIntensity > 0.01 ? min(uv.y, effectiveHeightScale) : uv.y;
  float windStrength = pow(windUvY, 2.0);

  vec4 trailSample = texture2D(uTrail, fieldUV);
  float trailIntensity = trailSample.b;
  vec2 trailDir = trailSample.rg * 2.0 - 1.0;

  float push = trailIntensity * windStrength * uTrailStrengthX * 2.5 * effectiveScale;
  transformed.x += trailDir.x * push;
  transformed.z += trailDir.y * push;

  float t = uTime;
  float rPhase = aRandom * 6.2832;

  float gustDispX = 0.0;
  float gustDispZ = 0.0;
  if (uGustBlend > 0.001 && abs(uGustStrength) > 0.001) {
    float projectedPos = instanceX * uGustDirX + instanceZ * uGustDirZ;
    float distFromFront = projectedPos - uGustFrontX;

    float lead = 1.0 - smoothstep(-15.0, 0.0, distFromFront);
    float trailEdge = smoothstep(-uGustWidth, -uGustWidth * 0.5, distFromFront);
    float inGust = lead * trailEdge * uGustBlend;

    float freqVar = 0.7 + aHeight * 0.5 + aRandom * 0.3;

    float scroll = instanceX * uGustDirX + instanceZ * uGustDirZ;
    float cross = -instanceZ * uGustDirX + instanceX * uGustDirZ;

    float patchA = sin(scroll * 0.09 + rPhase * 0.2) * sin(cross * 0.07 + rPhase * 0.3 + 1.4);
    float baseLean = 0.9 + patchA * 0.3;
    float baseDisp = baseLean * uGustStrength;

    float turbAmp = uGustStrength * 0.15;
    float turb = sin(scroll * 0.19 + t * 1.2 * freqVar + rPhase) * 0.6
               + sin(cross * 0.14 + t * 0.8 * freqVar + rPhase * 0.7 + 2.1) * 0.4;
    float turbDisp = turb * turbAmp;

    float crossDisp = sin(cross * 0.11 + t * 0.6 + rPhase * 0.5 + 1.8)
                    * uGustStrength * 0.12;

    gustDispX = inGust * (baseDisp + turbDisp) * windStrength * aHeight * effectiveScale;
    gustDispZ = inGust * crossDisp * windStrength * aHeight * effectiveScale;
  }

  float px = instanceX * 0.0613 + instanceZ * 0.0421;
  float ambientFreq = 0.4 + aHeight * 0.4 + aRandom * 0.2;
  float ambientX = sin(px + rPhase * 0.5 + t * 1.4 * ambientFreq) * 0.10
                 + sin(px * 1.4 + rPhase + t * 0.85 * ambientFreq + 1.4) * 0.05;

  float ambientScroll = instanceX * uAmbientDirX + instanceZ * uAmbientDirZ;
  float ambientCross = -instanceZ * uAmbientDirX + instanceX * uAmbientDirZ;
  float ambientPatch = sin(ambientScroll * 0.07 + rPhase * 0.15)
                     * sin(ambientCross * 0.05 + rPhase * 0.22 + 2.1);
  float ambientLean = uAmbientStrength * (1.0 + ambientPatch * 0.25);
  float ambientBreeze = ambientLean
                      * (0.85 + sin(ambientScroll * 0.04 + t * 0.22 + rPhase * 0.3) * 0.15);

  // Gust displacement — rotates with gust direction
  // Ambient displacement — always in fixed ambient direction, independent of gust
  float ambWindX = (ambientBreeze + ambientX) * windStrength * aHeight * effectiveScale;

  vec4 worldPos = instanceMatrix * vec4(transformed, 1.0);
  worldPos.x += gustDispX * uGustDirX - gustDispZ * uGustDirZ;
  worldPos.z += gustDispX * uGustDirZ + gustDispZ * uGustDirX;
  worldPos.x += ambWindX * uAmbientDirX;
  worldPos.z += ambWindX * uAmbientDirZ;

  vWorldPos = worldPos.xyz;

  vCursorBend = pow(trailIntensity, 3.5);

  gl_Position = projectionMatrix * modelViewMatrix * worldPos;
}
`;

const fragmentShader = /* glsl */`
uniform float uTime;
uniform vec3 uBaseColor;
uniform vec3 uMidColor;
uniform vec3 uTipPale;
uniform vec3 uTipBright;
uniform vec3 uSpecColor;
uniform vec2 uSunDir;
uniform float uLightMin;
uniform float uAOMin;
uniform float uCutHeight;
uniform vec3 uBentBase;
uniform vec3 uBentMid;
uniform vec3 uBentTipLo;
uniform vec3 uBentTipHi;
uniform float uFieldMinZ;
uniform float uFieldMaxZ;
uniform vec3 uHazeColor;
varying vec2 vUv;
varying float vRandom;
varying vec2 vWorldNormal;
varying float vCursorBend;
varying float vMow;
varying float vBladeHeight;
varying vec3 vWorldPos;

void main() {
  float randVar = (vRandom - 0.5) * 2.0 * (10.0 / 255.0);

  vec3 baseColor = uBaseColor + vec3(randVar);
  vec3 midColor  = uMidColor;
  vec3 tipPale = uTipPale;
  vec3 tipBright = uTipBright;

  float cursorBendAmt = pow(clamp(vCursorBend, 0.0, 1.0), 1.4);
  vec3 tipColor = mix(tipPale, tipBright, smoothstep(0.70, 1.0, vUv.y));

  vec3 col = baseColor;
  col = mix(col, midColor, smoothstep(0.35, 0.50, vUv.y));
  col = mix(col, tipColor, smoothstep(0.70, 0.85, vUv.y));

  vec3 bentCol = uBentBase;
  bentCol = mix(bentCol, uBentMid, smoothstep(0.35, 0.50, vUv.y));
  bentCol = mix(bentCol, uBentTipLo, smoothstep(0.70, 0.85, vUv.y));
  bentCol = mix(bentCol, uBentTipHi, smoothstep(0.85, 1.00, vUv.y));

  col = mix(col, bentCol, cursorBendAmt);

  float ao = smoothstep(0.0, 0.25, vUv.y);
  col *= (uAOMin + (1.0 - uAOMin) * ao);

  float sunDot = dot(normalize(vWorldNormal), uSunDir);
  float light = uLightMin + (1.0 - uLightMin) * sunDot;
  col *= light;

  float specular = pow(max(0.0, vUv.y - 0.85) / 0.15, 2.0) * 0.4;
  specular *= 1.0 - cursorBendAmt * 0.9;
  col += uSpecColor * specular;

  float depthT = clamp((vWorldPos.z - uFieldMinZ) / (uFieldMaxZ - uFieldMinZ), 0.0, 1.0);
  col = mix(uHazeColor, col, 0.55 + depthT * 0.45);

  float cutAmt = clamp((vMow - 0.35) * (1.0 / 0.2), 0.0, 1.0);
  if (cutAmt > 0.001) {
    float nightCut = smoothstep(0.52, 0.34, uLightMin);
    col *= mix(1.0, mix(1.0, 1.12, nightCut), cutAmt);
    float atTop = smoothstep(uCutHeight * 0.85, uCutHeight, vUv.y * vBladeHeight);
    col = mix(col, col * mix(1.35, 1.48, nightCut), atTop * 0.6 * cutAmt);
  }

  gl_FragColor = vec4(col, 1.0);
}
`;

function applyAmbiencePlayback() {
  if (dayAudioBuffer && !dayAmbienceSource) {
    dayAmbienceSource = audioCtx.createBufferSource();
    dayAmbienceSource.buffer = dayAudioBuffer;
    dayAmbienceSource.loop   = true;
    dayAmbienceSource.connect(dayAmbienceGain);
    dayAmbienceSource.start();
  }
  if (nightAudioBuffer && !nightAmbienceSource) {
    nightAmbienceSource = audioCtx.createBufferSource();
    nightAmbienceSource.buffer = nightAudioBuffer;
    nightAmbienceSource.loop   = true;
    nightAmbienceSource.connect(cricketMasterGain);
    nightAmbienceSource.start();
  }
}

function crossfadeToNight() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  dayAmbienceGain.gain.cancelScheduledValues(now);
  cricketMasterGain.gain.cancelScheduledValues(now);
  dayAmbienceGain.gain.setTargetAtTime(0.0, now, 1.2);
  cricketMasterGain.gain.setTargetAtTime(
    audioMuted ? 0 : 0.9, now, 1.8
  );
}

function crossfadeToDay() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

const FF_LIGHT_SLOTS   = 12;
const FF_SET_ENTER     = 0.15;
const FF_SET_LEAVE     = 0.05;
const FF_SLOT_FADE_DUR = 0.3;
const ffSlots = Array.from({ length: FF_LIGHT_SLOTS }, () => ({
  fireflyIndex: null,
  bri: 0,
}));
const _ffOccupiedSet = new Set();
const _ffCandidates = [];

function resetFireflyGrassSlots() {
  for (let s = 0; s < FF_LIGHT_SLOTS; s++) {
    ffSlots[s].fireflyIndex = null;
    ffSlots[s].bri = 0;
  }
}

function updateFireflyGlowInstances(delta) {
  if (fireflyFadeT === 0.0 && !isNight) return;

  for (let i = 0; i < FIREFLY_COUNT; i++) {
    const b = ff[i].brightness;
    if (!ff[i].ffInSet && b > FF_SET_ENTER) ff[i].ffInSet = true;
    else if (ff[i].ffInSet && b < FF_SET_LEAVE) ff[i].ffInSet = false;
  }

  const fadeK = Math.min(1, delta / FF_SLOT_FADE_DUR);
  const trackK = Math.min(1, delta / 0.05);

  for (let s = 0; s < FF_LIGHT_SLOTS; s++) {
    const slot = ffSlots[s];
    if (slot.fireflyIndex === null) continue;

    const f = ff[slot.fireflyIndex];
    const target = f.ffInSet ? f.brightness * fireflyFadeT : 0;
    const k = f.ffInSet ? trackK : fadeK;
    slot.bri += (target - slot.bri) * k;

    if (!f.ffInSet && slot.bri < 0.01) {
      slot.fireflyIndex = null;
      slot.bri = 0;
    }
  }

  _ffOccupiedSet.clear();
  for (let s = 0; s < FF_LIGHT_SLOTS; s++) {
    if (ffSlots[s].fireflyIndex !== null) _ffOccupiedSet.add(ffSlots[s].fireflyIndex);
  }

  _ffCandidates.length = 0;
  for (let i = 0; i < FIREFLY_COUNT; i++) {
    if (ff[i].ffInSet && !_ffOccupiedSet.has(i)) _ffCandidates.push(i);
  }
  _ffCandidates.sort((a, b) => {
    const da = Math.hypot(ff[a].x - camera.position.x, ff[a].y - camera.position.y, ff[a].z - camera.position.z);
    const db = Math.hypot(ff[b].x - camera.position.x, ff[b].y - camera.position.y, ff[b].z - camera.position.z);
    return da - db;
  });

  let ci = 0;
  for (let s = 0; s < FF_LIGHT_SLOTS && ci < _ffCandidates.length; s++) {
    if (ffSlots[s].fireflyIndex === null) {
      ffSlots[s].fireflyIndex = _ffCandidates[ci++];
      ffSlots[s].bri = 0;
    }
  }

  for (let s = 0; s < FF_LIGHT_SLOTS; s++) {
    const slot = ffSlots[s];
    if (slot.fireflyIndex === null || slot.bri < 0.01) {
      _glowDummy.position.set(-9999, 0, 0);
      _glowDummy.scale.setScalar(1);
    } else {
      const f = ff[slot.fireflyIndex];
      _glowDummy.position.set(f.x, 0.02, f.z);
      _glowDummy.scale.setScalar(slot.bri);
    }
    _glowDummy.rotation.set(0, 0, 0);
    _glowDummy.updateMatrix();
    fireflyGlowMesh.setMatrixAt(s, _glowDummy.matrix);
  }
  fireflyGlowMesh.instanceMatrix.needsUpdate = true;
}

const fireflyGlowGeo = new THREE.PlaneGeometry(4, 4);

const fireflyGlowMat = new THREE.ShaderMaterial({
  uniforms: {
    projectionMatrix: { value: camera.projectionMatrix },
    modelViewMatrix:  { value: new THREE.Matrix4() },
    uGlowColor:       { value: new THREE.Vector3(0.45, 0.72, 0.15) },
    uGlowIntensity:   { value: 0.0 },
    uVisible:         { value: 0.0 },
  },
  vertexShader: /* glsl */`
    attribute mat4 instanceMatrix;
    varying vec2 vUv;
    varying vec3 vWorldPos;

    void main() {
      vUv = uv;
      vec4 worldPos = instanceMatrix * vec4(position, 1.0);
      vWorldPos = worldPos.xyz;
      gl_Position = projectionMatrix * modelViewMatrix * worldPos;
    }
  `,
  fragmentShader: /* glsl */`
    uniform vec3 uGlowColor;
    uniform float uGlowIntensity;
    varying vec2 vUv;

    void main() {
      float r = length(vUv - vec2(0.5));
      float glow = smoothstep(0.5, 0.0, r);
      glow = pow(glow, 2.5);
      gl_FragColor = vec4(uGlowColor * glow * uGlowIntensity, glow * uGlowIntensity);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  side: THREE.FrontSide,
});

const fireflyMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uVisible:    { value: 0.0 },
    uFFSizeBase: { value: FF_SIZE_BASE },
    uFFBriMin:   { value: FF_BRI_MIN },
    uFFBriRange: { value: FF_BRI_RANGE },
  },
  vertexShader: /* glsl */`
    attribute float aBrightness;
    uniform float uVisible;
    uniform float uFFSizeBase;
    uniform float uFFBriMin;
    uniform float uFFBriRange;

    varying float vBrightness;

    void main() {
      vBrightness = aBrightness * uVisible;
      vec4 mvPos  = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mvPos;
      float dist  = max(-mvPos.z, 1.0);
      gl_PointSize = uFFSizeBase / dist * (uFFBriMin + aBrightness * uFFBriRange) * uVisible;
    }
  `,
  fragmentShader: /* glsl */`
    varying float vBrightness;

    void main() {
      vec2 uv = gl_PointCoord * 2.0 - 1.0;
      float r2 = dot(uv, uv);
      if (r2 > 1.0) discard;

      float core = exp(-r2 * 8.0);
      float halo = exp(-r2 * 2.5) * 0.35;
      float glow = core + halo;

      vec3 color = mix(
        vec3(0.55, 1.0, 0.18),
        vec3(0.85, 1.0, 0.35),
        core
      );

      gl_FragColor = vec4(color * glow * vBrightness, glow * vBrightness);
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

function createPermanentFirefly() {
  const zT   = Math.pow(Math.random(), 0.55);
  const homeX = fieldMinX + Math.random() * (fieldMaxX - fieldMinX);
  const homeZ = fieldMinZ + zT * (fieldMaxZ - fieldMinZ);

  const wanderRadius = 1.2 + Math.random() * 4.5;
  const wanderSpeed  = 0.15 + Math.random() * 0.55;
  const heightMin    = 0.2  + Math.random() * 0.4;

  const heightSpeed  = 0.08 + Math.random() * 0.18;
  const glowSize     = 5.0  + Math.random() * 10.0;

  return {
    homeX, homeZ,
    x: homeX, y: heightMin + Math.random() * (heightMax - heightMin), z: homeZ,
    wanderRadius, wanderSpeed,
    heightMin, heightMax, heightSpeed,
    heightPhase: Math.random() * Math.PI * 2,

const clipMat = new THREE.ShaderMaterial({
  uniforms: {
    projectionMatrix: { value: camera.projectionMatrix },
    modelViewMatrix:  { value: new THREE.Matrix4() },
    uBaseColor:  grassMaterial.uniforms.uBaseColor,
    uMidColor:   grassMaterial.uniforms.uMidColor,
    uTipPale:    grassMaterial.uniforms.uTipPale,
    uTipBright:  grassMaterial.uniforms.uTipBright,
    uAOMin:      grassMaterial.uniforms.uAOMin,
  },
  vertexShader: /* glsl */`
    attribute float aClipHeight;
    attribute float aClipWidth;
    attribute float aClipLean;
    attribute float aClipAlpha;
    varying vec2  vUv;
    varying float vAlpha;
    void main() {
      vUv   = uv;
      vAlpha = aClipAlpha;
      vec3 pos = position;
      pos.x *= aClipWidth;
      pos.y *= aClipHeight;
      pos.x += sin(aClipLean * uv.y * 0.4) * aClipHeight * 0.25;
      pos.x += sin(aClipLean * pow(uv.y, 0.7)) * aClipHeight * 0.65;
      gl_Position = projectionMatrix * modelViewMatrix
                  * instanceMatrix * vec4(pos, 1.0);
    }
  `,
  fragmentShader: /* glsl */`
    uniform vec3  uBaseColor;
    uniform vec3  uMidColor;
    uniform vec3  uTipPale;
    uniform vec3  uTipBright;
    uniform float uAOMin;
    varying vec2  vUv;
    varying float vAlpha;
    void main() {
      vec3 col = uBaseColor;
      col = mix(col, uMidColor,  smoothstep(0.35, 0.50, vUv.y));
      col = mix(col, uTipPale,   smoothstep(0.70, 0.85, vUv.y));
      col = mix(col, uTipBright, smoothstep(0.85, 1.00, vUv.y));
      float ao = smoothstep(0.0, 0.25, vUv.y);
      col *= (uAOMin + (1.0 - uAOMin) * ao);
      if (vAlpha < 0.01) discard;
      gl_FragColor = vec4(col, vAlpha);
    }
  `,
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false,
});

const CLIP_COUNT = 1200;

const clipHeightArr = new Float32Array(CLIP_COUNT);
const clipWidthArr  = new Float32Array(CLIP_COUNT);
const clipLeanArr   = new Float32Array(CLIP_COUNT);
const clipAlphaArr  = new Float32Array(CLIP_COUNT);

clipBladeGeo.setAttribute('aClipHeight',
  new THREE.InstancedBufferAttribute(clipHeightArr, 1).setUsage(THREE.DynamicDrawUsage));
clipBladeGeo.setAttribute('aClipWidth',
  new THREE.InstancedBufferAttribute(clipWidthArr,  1).setUsage(THREE.DynamicDrawUsage));
clipBladeGeo.setAttribute('aClipLean',
  new THREE.InstancedBufferAttribute(clipLeanArr,   1).setUsage(THREE.DynamicDrawUsage));
clipBladeGeo.setAttribute('aClipAlpha',
  new THREE.InstancedBufferAttribute(clipAlphaArr,  1).setUsage(THREE.DynamicDrawUsage));

const clipMesh = new THREE.InstancedMesh(clipBladeGeo, clipMat, CLIP_COUNT);
clipMesh.frustumCulled = false;
clipMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
scene.add(clipMesh);

const _cd = new THREE.Object3D();

const clips = Array.from({ length: CLIP_COUNT }, () => ({
  active: false,
  x: 0, y: 0, z: 0,
  velX: 0, velY: 0, velZ: 0,
  rotY: 0, rotVelY: 0,
  tiltX: 0, tiltZ: 0,
  age: 0, maxAge: 0,
  height: 0, width: 0, lean: 0,
}));
let clipIdx = 0;
const activeClips = [];

function spawnClips(wx, wz, fraction) {
  const brushRadius = trailMaterial.uniforms.uBrushSize.value
                    * (fieldMaxX - fieldMinX);
  const count = Math.max(5, Math.round((18 + Math.floor(Math.random() * 12)) * (fraction || 1.0)));

  for (let i = 0; i < count; i++) {
    const idx = clipIdx % CLIP_COUNT;
    const c = clips[idx];
    const wasActive = c.active;
    clipIdx++;

    const angle = Math.random() * Math.PI * 2;
    const r     = Math.random() * brushRadius;

    c.active  = true;
    if (!wasActive) activeClips.push(idx);
    c.x       = wx + Math.cos(angle) * r;
    c.z       = wz + Math.sin(angle) * r;
    const origH = 0.4 + Math.random() * 0.8;
    c.height  = origH * 0.5;
    c.y       = origH * 0.5;
    c.width   = 0.022 + Math.random() * 0.022;
    c.lean    = (Math.random() - 0.5) * 0.5;

    c.velX    = (Math.random() - 0.5) * 2.5;
    c.velY    = 0.8 + Math.random() * 1.5;
    c.velZ    = (Math.random() - 0.5) * 2.5;

    c.tiltX   = (Math.random() - 0.5) * 1.2;
    c.tiltZ   = (Math.random() - 0.5) * 1.2;
    c.rotY    = Math.random() * Math.PI * 2;
    c.rotVelY = (Math.random() - 0.5) * 6;

    c.age     = 0;
    c.maxAge  = 0.6 + Math.random() * 0.6;
  }
}

const infoCard = document.getElementById('info-card');
const btnInfo = document.getElementById('btn-info');

function infoCardOpen() {
  return infoCard.classList.contains('visible') ||
         infoCard.classList.contains('opening');
}

function showInfoCard() {
  infoCard.classList.remove('closing');
  infoCard.classList.add('visible', 'opening');
}

function hideInfoCard() {
  if (!infoCardOpen() || infoCard.classList.contains('closing')) return;
  infoCard.classList.remove('visible', 'opening');
  infoCard.classList.add('closing');
}

infoCard.addEventListener('animationend', (e) => {
  if (e.target !== infoCard) return;
  if (e.animationName === 'cardMorphIn') {
    infoCard.classList.remove('opening');
  } else if (e.animationName === 'cardMorphOut') {
    infoCard.classList.remove('closing');
  }
});

btnInfo.addEventListener('click', (e) => {
  e.stopPropagation();
  if (infoCard.classList.contains('closing')) {
    infoCard.classList.remove('closing');
    showInfoCard();
    return;
  }
  if (infoCardOpen()) hideInfoCard();
  else showInfoCard();
});
document.addEventListener('click', (e) => {
  if (!infoCard.contains(e.target) && e.target !== btnInfo) {

updateBtnTOD();

const clock = new THREE.Clock();

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    clock.getDelta();
  }
});

const LOADING_MIN_MS = 2000;
let sceneReady       = false;
let frameReady       = false;
let timerReady       = false;

camera.updateProjectionMatrix();

function updateFireflies(delta, elapsed, gustStrength, gustDirX, gustDirZ,
                          cursorX, cursorZ, cursorSpeed, cursorOnGrass) {
  if (fireflyFadeT === 0.0 && !isNight) return;

  const spawnThreshold = 4.0;
  if (cursorOnGrass && cursorSpeed > spawnThreshold && Math.random() < cursorSpeed * 0.012) {
    for (let s = FIREFLY_PERMANENT; s < FIREFLY_COUNT; s++) {
      if (!ff[s].active) {
        const f = ff[s];
        f.active    = true;
        f.homeX     = cursorX + (Math.random() - 0.5) * 3.0;
        f.homeZ     = cursorZ + (Math.random() - 0.5) * 3.0;
        f.x         = f.homeX;
        f.y         = 0.2 + Math.random() * 0.5;
        f.z         = f.homeZ;
        f.lifespan  = 4.0 + Math.random() * 5.0;
        f.maxLife   = f.lifespan;
        f.fadeProgress = 0;
        f.fadeState = 'on';
        f.breathePhase = Math.random() * Math.PI * 2;
        f.repelX    = (Math.random() - 0.5) * 2.0;
        f.repelZ    = (Math.random() - 0.5) * 2.0;
        f.windAccumX = 0;
        f.windAccumZ = 0;
        break;
      }
    }
  }

  for (let i = 0; i < FIREFLY_COUNT; i++) {
    const f = ff[i];

    const windPush = gustStrength * 1.2 * delta;
    f.windAccumX += gustDirX * windPush;
    f.windAccumZ += gustDirZ * windPush;
    f.windAccumX *= 0.992;
    f.windAccumZ *= 0.992;

    const t = elapsed;
    const wx = Math.sin(t * f.wanderSpeed * 0.41 + f.heightPhase)       * f.wanderRadius
             + Math.sin(t * f.wanderSpeed * 0.17 + f.heightPhase * 1.6) * f.wanderRadius * 0.45;
    const wz = Math.cos(t * f.wanderSpeed * 0.29 + f.heightPhase * 2.3) * f.wanderRadius
             + Math.cos(t * f.wanderSpeed * 0.13 + f.heightPhase * 0.7) * f.wanderRadius * 0.4;

    f.x = f.homeX + wx + f.windAccumX;
    f.z = f.homeZ + wz + f.windAccumZ;

    f.y = f.heightMin + (f.heightMax - f.heightMin) *
          (Math.sin(performance.now() * 0.001 * f.heightSpeed + f.heightPhase) * 0.5 + 0.5);

    if (cursorOnGrass) {
      const dx = f.x - cursorX;
      const dz = f.z - cursorZ;
      const dist2 = dx * dx + dz * dz;
      if (dist2 < FF_REPEL_RADIUS && dist2 > 0.01) {
        const dist  = Math.sqrt(dist2);
        const force = (1.0 - dist2 / FF_REPEL_RADIUS) * 2.5 * delta;
        f.windAccumX += (dx / dist) * force;
        f.windAccumZ += (dz / dist) * force;
        f.y = Math.min(f.heightMax + 1.5, f.y + force * 0.8);
      }
    }

    if (f.isTemp) {
      if (!f.active) {
        f.brightness = 0;
        ffPositions[i * 3]     = -9999;
        ffPositions[i * 3 + 1] = -9999;
        ffPositions[i * 3 + 2] = -9999;
        ffBrightness[i]        = 0;
        continue;
      }

      f.lifespan -= delta;
      if (f.lifespan <= 0) {
        f.active = false;
        continue;
      }

      const lifeT = f.lifespan / f.maxLife;
      const birthFade = Math.min(1.0, (f.maxLife - f.lifespan) / 0.4);
      const deathFade = lifeT < 0.3 ? lifeT / 0.3 : 1.0;
      f.fadeProgress = 0;

      f.repelX *= 0.94;
      f.repelZ *= 0.94;
      f.x += f.repelX * delta;
      f.z += f.repelZ * delta;

      const breathe = Math.sin(elapsed * f.breatheSpeed + f.breathePhase) * 0.5 + 0.5;
      f.brightness  = f.baseGlow * birthFade * deathFade
                    * (0.6 + breathe * 0.4);
    } else {
      const breathe = Math.sin(elapsed * f.breatheSpeed + f.breathePhase) * 0.5 + 0.5;
      const glowFromBreathe = f.baseGlow + breathe * (1.0 - f.baseGlow) * 0.45;

      if (f.fadeState === 'on') {
        f.fadeTimer -= delta;
        f.fadeProgress = 0;
        if (f.fadeTimer <= 0) {
          f.fadeState    = 'fadingOut';
          f.fadeProgress = 0;
          f.fadeDuration = 1.0 + Math.random() * 0.8;
        }
      } else if (f.fadeState === 'fadingOut') {
        f.fadeProgress += delta / f.fadeDuration;
        if (f.fadeProgress >= 1) {
          f.fadeProgress = 1;
          f.fadeState    = 'fadingIn';
          f.fadeDuration = 1.5 + Math.random() * 1.2;
        }
      } else if (f.fadeState === 'fadingIn') {
        f.fadeProgress -= delta / f.fadeDuration;
        if (f.fadeProgress <= 0) {
          f.fadeProgress = 0;
          f.fadeState    = 'on';
          f.fadeTimer    = 6 + Math.random() * 14;
        }
      }

      const fadeEnvelope = 1.0 - (3 * f.fadeProgress * f.fadeProgress
                                 - 2 * f.fadeProgress * f.fadeProgress * f.fadeProgress);

      f.brightness = glowFromBreathe * fadeEnvelope;
    }

    ffPositions[i * 3]     = f.x;
    ffPositions[i * 3 + 1] = f.y;
    ffPositions[i * 3 + 2] = f.z;
    ffBrightness[i]        = f.brightness;
  }

  ffGeo.attributes.position.needsUpdate    = true;
  ffGeo.attributes.aBrightness.needsUpdate = true;
}

function updateClips(delta) {
  if (activeClips.length === 0) return;

  for (let ai = activeClips.length - 1; ai >= 0; ai--) {
    const i = activeClips[ai];
    const c = clips[i];

    c.age += delta;
    if (c.age >= c.maxAge || c.y < 0) {
      c.active = false;
      clipAlphaArr[i] = 0;
      activeClips.splice(ai, 1);
      continue;
    }

    c.velY  -= 5.5 * delta;
    c.x     += c.velX  * delta;
    c.y     += c.velY  * delta;
    c.z     += c.velZ  * delta;
    c.rotY  += c.rotVelY * delta;
    c.velX  *= 0.98;
    c.velZ  *= 0.98;

    const lifeT = c.age / c.maxAge;
    clipAlphaArr[i] = lifeT < 0.3
      ? 1.0
      : Math.max(0, 1.0 - (lifeT - 0.3) / 0.7);

    clipHeightArr[i] = c.height;
    clipWidthArr[i]  = c.width;
    clipLeanArr[i]   = c.lean;

    _cd.position.set(c.x, Math.max(0, c.y), c.z);
    _cd.rotation.set(c.tiltX, c.rotY, c.tiltZ);
    _cd.scale.setScalar(1);
    _cd.updateMatrix();
    clipMesh.setMatrixAt(i, _cd.matrix);
  }

  if (activeClips.length > 0) {
    clipMesh.instanceMatrix.needsUpdate = true;
    clipBladeGeo.attributes.aClipHeight.needsUpdate = true;
    clipBladeGeo.attributes.aClipWidth.needsUpdate  = true;
    clipBladeGeo.attributes.aClipLean.needsUpdate   = true;
    clipBladeGeo.attributes.aClipAlpha.needsUpdate  = true;
  }
}

// ── Render loop ─────────────────────────────────────────────────────────────
function hideLoadingScreen() {
  if (sceneReady) return;
  const overlay = document.getElementById('loading-overlay');
  if (!overlay) return;
  sceneReady = true;
  overlay.classList.add('hidden');
  customCursor.style.display = 'block';
  customCursor.style.opacity = '1';
  setTimeout(() => overlay.remove(), 900);
}

function tryHideLoader() {
  if (frameReady && timerReady) hideLoadingScreen();
}

setTimeout(() => {
  timerReady = true;
  tryHideLoader();
}, LOADING_MIN_MS);

function animate() {
  if (devMode && fpsEl) {
    fpsFrames++;
    const fpsNow = performance.now();
    if (fpsNow - fpsIntervalStart >= 1000) {
      fpsEl.textContent = Math.round(fpsFrames * 1000 / (fpsNow - fpsIntervalStart)) + ' FPS';
      fpsFrames = 0;
      fpsIntervalStart = fpsNow;
    }
  }

  if (!sceneReady) {
    updateCustomCursorScale();
    renderer.render(scene, camera);
    return;
  }

  const delta = clock.getDelta();
  const safeDelta = Math.min(delta, 0.05);
  const elapsed = clock.elapsedTime;

  updateGust(safeDelta);

  const springTarget = gust.strength;
  const springForce = (springTarget - springPos) * SPRING_STIFFNESS;
  // High damping only after spring has had 2.5s to ring; prevents killing overshoot on CALM entry
  const activeDamping = (gust.state === 'CALM' && gust.phaseTimer > 5.0) ? SPRING_DAMPING * 4 : SPRING_DAMPING;
  const dampForce = springVel * activeDamping;
  springVel += (springForce - dampForce) * safeDelta;
  springPos += springVel * safeDelta;

  if (gust.state === 'ACTIVE' || gust.state === 'FADING') {
    gustBlend = Math.min(1.0, gustBlend + safeDelta * 2.0);
  } else if (gust.state === 'BUILDING') {
    gustBlend = Math.min(1.0, gustBlend + safeDelta * 1.5);
  } else {
    const springSettled = Math.abs(springPos) < 0.03 && Math.abs(springVel) < 0.05;
    if (springSettled) {
      gustBlend = Math.max(0.0, gustBlend - safeDelta * 3.0);
    }
  }
  grassMaterial.uniforms.uGustBlend.value = gustBlend;

  grassMaterial.uniforms.uTime.value = elapsed;
  grassMaterial.uniforms.uGustFrontX.value = gust.frontX;
  grassMaterial.uniforms.uGustStrength.value = springPos;
  currentWidth += (gust.width - currentWidth) * Math.min(1, safeDelta * 1.5);
  grassMaterial.uniforms.uGustWidth.value = currentWidth;
  const dirLerp = Math.min(1, safeDelta / Math.max(0.1, gust.buildDuration) * 3);
  currentDirX += (gust.dirX - currentDirX) * dirLerp;
  currentDirZ += (gust.dirZ - currentDirZ) * dirLerp;
  grassMaterial.uniforms.uGustDirX.value = currentDirX;
  grassMaterial.uniforms.uGustDirZ.value = currentDirZ;

  if (todTransitioning && transitionFrom && transitionTo) {
    todTransitionT = Math.min(1.0, todTransitionT + safeDelta / TOD_TRANS_DUR);
    const ease = todTransitionT < 0.5
      ? 2 * todTransitionT * todTransitionT
      : 1 - Math.pow(-2 * todTransitionT + 2, 2) / 2;

    const u = grassMaterial.uniforms;
    u.uBaseColor.value.lerpVectors(transitionFrom.base,      transitionTo.base,      ease);
    u.uMidColor.value.lerpVectors(transitionFrom.mid,       transitionTo.mid,       ease);
    u.uTipPale.value.lerpVectors(transitionFrom.tipPale,   transitionTo.tipPale,   ease);
    u.uTipBright.value.lerpVectors(transitionFrom.tipBright,transitionTo.tipBright,ease);
    u.uBentBase.value.lerpColors(transitionFrom.bentBase,  transitionTo.bentBase,  ease);
    u.uBentMid.value.lerpColors(transitionFrom.bentMid,   transitionTo.bentMid,   ease);
    u.uBentTipLo.value.lerpColors(transitionFrom.bentTipLo,transitionTo.bentTipLo,ease);
    u.uBentTipHi.value.lerpColors(transitionFrom.bentTipHi,transitionTo.bentTipHi,ease);
    u.uSpecColor.value.lerpVectors(transitionFrom.spec,    transitionTo.spec,      ease);
    u.uSunDir.value.lerpVectors(transitionFrom.sunDir,     transitionTo.sunDir,    ease);
    u.uSunDir.value.normalize();
    u.uLightMin.value = transitionFrom.lightMin + (transitionTo.lightMin - transitionFrom.lightMin) * ease;
    u.uAOMin.value    = transitionFrom.aoMin    + (transitionTo.aoMin    - transitionFrom.aoMin)    * ease;
    u.uHazeColor.value.lerpVectors(transitionFrom.hazeColor, transitionTo.hazeColor, ease);

    const skyNow = new THREE.Color().lerpColors(transitionFrom.sky, transitionTo.sky, ease);
    renderer.setClearColor(skyNow);
    groundMaterial.uniforms.uGroundNear.value.lerpColors(
      transitionFrom.groundNear, transitionTo.groundNear, ease);
    groundMaterial.uniforms.uGroundFar.value.lerpColors(
      transitionFrom.groundFar, transitionTo.groundFar, ease);

    if (todTransitionT >= 1.0) todTransitioning = false;
  }

  if (isNight) {
    if (fireflyDelay > 0) {
      fireflyDelay -= safeDelta;
    } else {
      fireflyFadeT = Math.min(1.0, fireflyFadeT + safeDelta / 2.0);
    }
  } else {
    fireflyFadeT = Math.max(0.0, fireflyFadeT - safeDelta / 3.0);
  }
  fireflyMaterial.uniforms.uVisible.value = fireflyFadeT;
  fireflyGlowMat.uniforms.uGlowIntensity.value = fireflyFadeT;
  fireflyGlowMat.uniforms.uVisible.value = fireflyFadeT;

  updateCursorDirection();
  updateCustomCursorScale();
  updateTrail();
  updateMow(safeDelta);
  if (cutDragGain && audioCtx) {
    const onGrass = cursorTrailUV.x >= 0 && cursorTrailUV.x <= 1 &&
                    cursorTrailUV.y >= 0 && cursorTrailUV.y <= 1;
    let cutTarget = 0;
    if (!audioMuted && (isMouseDown || isTouchMowing) && onGrass) {
      const speedFactor = Math.pow(Math.min(1, smoothSpeed * 0.6), 0.5);
      cutTarget = 0.26 * speedFactor;
    }
    cutDragGain.gain.setTargetAtTime(cutTarget, audioCtx.currentTime, 0.04);
  }
  updateAudioFromTrail();

  updateFireflies(
    safeDelta,
    elapsed,
    springPos,
    currentDirX,
    currentDirZ,
    cursorWorldX,
    cursorWorldZ,
    smoothVelocity,
    cursorTrailUV.x >= 0 && cursorTrailUV.x <= 1 &&
    cursorTrailUV.y >= 0 && cursorTrailUV.y <= 1
  );

  updateClips(safeDelta);

  updateFireflyGlowInstances(safeDelta);

  grassNear.updateMatrixWorld();
  grassFar.updateMatrixWorld();
  grassVeryFar.updateMatrixWorld();
  camera.updateMatrixWorld();
  const canvasW = window.innerWidth;
  const canvasH = window.innerHeight;
  if (canvasW > 0 && canvasH > 0) {
    const nextAspect = canvasW / canvasH;
    if (Math.abs(camera.aspect - nextAspect) > 0.001) {
      camera.aspect = nextAspect;
      camera.updateProjectionMatrix();
    }
  }
  grassMaterial.uniforms.projectionMatrix.value.copy(camera.projectionMatrix);
  grassMaterial.uniforms.modelViewMatrix.value.copy(camera.matrixWorldInverse).multiply(grassNear.matrixWorld);
  clipMat.uniforms.projectionMatrix.value.copy(camera.projectionMatrix);
  clipMat.uniforms.modelViewMatrix.value.copy(camera.matrixWorldInverse);
  fireflyGlowMat.uniforms.projectionMatrix.value.copy(camera.projectionMatrix);
  fireflyGlowMat.uniforms.modelViewMatrix.value.copy(camera.matrixWorldInverse);
  renderer.render(scene, camera);
}

renderer.setAnimationLoop(() => {
  renderer.render(scene, camera);
  renderer.setAnimationLoop(animate);
  frameReady = true;
  tryHideLoader();
});

console.log(`Touch Grass WebGL — ${BLADE_COUNT + BLADE_VERY_FAR} instanced blades`);
</script>
